<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lexicon - A2 Uzun Okuma Parçası</title>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; padding: 20px; line-height: 1.8; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: #1e293b; padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .passage { font-size: 1.25rem; }
    .clickable { color: #38bdf8; cursor: pointer; border-bottom: 2px dashed #38bdf8; font-weight: 500; }
    .clickable:hover { background: rgba(56, 189, 248, 0.1); }
    .btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; width: 100%; }
    .info-box { margin-top: 20px; padding: 15px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 4px; }
  </style>
</head>
<body>

<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
  const { useState } = React;

  const dict = {
    "montagnes": "dağlar", "aventure": "macera", "découvrir": "keşfetmek", "paysage": "manzara",
    "habitants": "halk", "accueillants": "misafirperver", "tranquille": "sakin", "chemin": "yol",
    "nature": "doğa", "village": "köy", "randonnée": "doğa yürüyüşü", "magnifique": "muhteşem",
    "sommet": "zirve", "expérience": "deneyim", "liberté": "özgürlük", "souvenirs": "anılar"
  };

  function App() {
    const [text, setText] = useState("Lütfen metin üretmek için aşağıdaki butona basın.");
    const [wordInfo, setWordInfo] = useState(null);

    const generateLongPassage = () => {
      // 200+ kelime için pasaj blokları
      const blocks = [
        "Thomas décide de faire un grand voyage dans les montagnes françaises cet été. Il veut découvrir la nature sauvage et profiter du paysage magnifique. La randonnée est longue mais le calme de la montagne lui apporte une paix intérieure profonde.",
        "Il arrive dans un petit village tranquille où les habitants sont très accueillants. Ils aiment partager leur culture et leurs histoires avec les visiteurs. Thomas apprend beaucoup de choses sur la vie simple ici. Il mange des produits locaux et il se sent très bien.",
        "Chaque matin, il se lève tôt pour explorer un nouveau chemin vers le sommet. L'aventure est une expérience authentique qui change sa vision du monde. Il prend beaucoup de photos pour garder des souvenirs précieux de ce voyage. La liberté qu'il ressent est incroyable.",
        "Le soir, il observe les étoiles et il pense à sa famille. C'est le plus beau voyage de sa vie. Il sait qu'il reviendra ici un jour car il a trouvé un endroit spécial. La nature est le meilleur professeur pour un jeune homme curieux."
      ];
      // 4 bloğu birleştirip daha uzun bir metin yapıyoruz
      setText(blocks.join(" ") + " " + blocks.reverse().join(" "));
    };

    const handleWordClick = (word) => {
      const clean = word.toLowerCase().replace(/[.,]/g, "");
      if (dict[clean]) {
        setWordInfo({ fr: clean, tr: dict[clean] });
      }
    };

    return (
      <div className="container">
        <h1>Fransızca A2 Okuma Parçası</h1>
        <button className="btn" onClick={generateLongPassage}>📖 Pasajı Üret (200+ Kelime)</button>
        
        <div className="card passage">
          {text.split(" ").map((w, i) => (
            <span key={i} className={dict[w.toLowerCase().replace(/[.,]/g, "")] ? "clickable" : ""}
                  onClick={() => handleWordClick(w)}>
              {w}{" "}
            </span>
          ))}
        </div>

        {wordInfo && (
          <div className="info-box">
            <strong>{wordInfo.fr}</strong> → {wordInfo.tr}
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
