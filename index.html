<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>A2 Okuma Sistemi</title>
  <style>
    body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    .card { background: #1e293b; padding: 25px; border-radius: 12px; }
    .passage { line-height: 1.8; font-size: 0.95rem; }
    .word { cursor: pointer; color: #38bdf8; border-bottom: 1px dashed #38bdf8; }
    .btn { background: #f472b6; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 20px; }
    .info { margin-top: 20px; padding: 15px; background: #000; border-left: 4px solid #f472b6; }
  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useState } = React;

  // Genişletilmiş Sözlük
  const dictionary = {
    "le": "o", "la": "o", "les": "onlar", "est": "dir", "voyage": "seyahat", "montagne": "dağ",
    "nature": "doğa", "tranquille": "sakin", "fleur": "çiçek", "soleil": "güneş",
    "travaille": "çalışır", "grand": "büyük", "petit": "küçük", "manger": "yemek",
    "ciel": "gökyüzü", "oiseau": "kuş", "maison": "ev", "chat": "kedi", "chien": "köpek",
    "beau": "güzel", "livre": "kitap", "ecole": "okul", "ami": "arkadaş", "très": "çok"
  };

  function App() {
    const [text, setText] = useState("Metin üretmek için butona basınız.");
    const [selectedWord, setSelectedWord] = useState({ w: "", t: "" });

    const generate = () => {
      const words = Object.keys(dictionary);
      let newPassage = "";
      // 200+ kelime üret
      for(let i=0; i<250; i++) {
        newPassage += words[Math.floor(Math.random() * words.length)] + " ";
      }
      setText(newPassage);
    };

    return (
      <div className="container">
        <button className="btn" onClick={generate}>YENİ PASAJ ÜRET (200+ Kelime)</button>
        <div className="card">
          <div className="passage">
            {text.split(" ").map((w, i) => {
              const clean = w.toLowerCase();
              return (
                <span 
                  key={i} 
                  className="word" 
                  onClick={() => setSelectedWord({ w, t: dictionary[clean] || "Sözlükte tanımlı değil" })}
                >
                  {w}{" "}
                </span>
              );
            })}
          </div>
        </div>
        
        {selectedWord.w && (
          <div className="info" key={selectedWord.w + Math.random()}>
            <strong>{selectedWord.w}</strong>: {selectedWord.t}
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
