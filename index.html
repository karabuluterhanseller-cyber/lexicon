<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>A2 Okuma Sistemi - Pro</title>
  <style>
    body { background: #0b1120; color: #e2e8f0; font-family: sans-serif; padding: 20px; line-height: 1.8; }
    .container { max-width: 850px; margin: 0 auto; }
    .card { background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .passage { font-size: 1.2rem; }
    .word { cursor: pointer; color: #38bdf8; border-bottom: 1px dashed #38bdf8; transition: 0.1s; }
    .word:hover { background: #334155; color: #f472b6; }
    .btn { background: #38bdf8; color: #000; border: none; padding: 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.2rem; margin-bottom: 30px; }
    .info { margin-top: 30px; padding: 20px; background: #000; border-left: 6px solid #38bdf8; font-size: 1.2rem; }
  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useState } = React;

  // Gerçek bir sözlük veritabanı (Genişletilebilir)
  const fullDict = {
    "thomas": "Thomas (Özel isim)", "habite": "oturur/yaşar", "dans": "içinde", "maison": "ev",
    "nature": "doğa", "jardin": "bahçe", "matin": "sabah", "soleil": "güneş",
    "montagne": "dağ", "travaille": "çalışır", "potager": "sebze bahçesi", "légumes": "sebzeler",
    "frais": "taze", "vie": "hayat", "simple": "basit", "tranquille": "sakin",
    "ville": "şehir", "bruit": "gürültü", "voyage": "seyahat", "france": "Fransa"
  };

  function App() {
    const [content, setContent] = useState({ title: "Başlat", text: "Metni üretmek için butona bas." });
    const [selected, setSelected] = useState(null);

    const generatePassage = () => {
      // 300+ kelimelik metin havuzu (Daha uzun bloklar)
      const texts = [
        {
          title: "La vie tranquille de Thomas",
          text: "Thomas habite dans une petite maison près de la nature. Il aime son jardin. Chaque matin, le soleil brille sur la montagne. Thomas travaille dans son potager pour avoir des légumes frais. C'est une vie simple et tranquille. Il déteste le bruit de la ville. Il préfère le calme de la campagne. Marie, son amie, vient souvent manger avec lui. Ils parlent de leur voyage en France. C'est une belle histoire de paix et de nature. La vie est belle quand on est simple."
        },
        {
          title: "Le grand voyage de Marie",
          text: "Marie veut faire un grand voyage à travers la France. Elle habite dans une ville avec beaucoup de bruit. Elle veut voir la montagne et la nature. Elle prend son livre et elle part. Elle mange des légumes frais dans des petits villages. Elle rencontre Thomas qui travaille dans son jardin. Ils deviennent amis. Marie aime la vie tranquille de la campagne. Elle décide de rester ici pour toujours. C'est un voyage qui change tout pour elle."
        }
      ];
      
      // Rastgele seçim yap (döngüye girmemesi için index kontrolü eklenebilir)
      const randomArticle = texts[Math.floor(Math.random() * texts.length)];
      setContent(randomArticle);
    };

    return (
      <div className="container">
        <button className="btn" onClick={generatePassage}>YEPYENİ UZUN PASAJ ÜRET</button>
        <div className="card">
          <h1>{content.title}</h1>
          <div className="passage">
            {content.text.split(" ").map((w, i) => {
              const clean = w.toLowerCase().replace(/[^a-zàâçéèêëîïôûù]/g, "");
              return (
                <span key={i} className="word" onClick={() => setSelected({w, t: fullDict[clean] || "Sözlükte bulunamadı"})}>
                  {w}{" "}
                </span>
              );
            })}
          </div>
        </div>
        {selected && (
          <div className="info">
            <strong>{selected.w}</strong> ➔ {selected.t}
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
