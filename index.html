<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lexicon - Uzun Metin Okuma ve Banka</title>
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: #1e293b; padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .passage { line-height: 2; font-size: 1.2rem; margin: 20px 0; }
    .clickable { color: #38bdf8; cursor: pointer; border-bottom: 2px dashed #38bdf8; font-weight: bold; }
    .clickable:hover { background: rgba(56, 189, 248, 0.2); }
    .btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .vault-status { margin-top: 10px; font-size: 0.9rem; color: #94a3b8; }
  </style>
</head>
<body>

<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  // Sözlüğümüz (Genişletilebilir)
  const dict = {
    "voyage": "seyahat", "montagne": "dağ", "paysage": "manzara", "habitants": "halk",
    "accueillants": "misafirperver", "simple": "basit", "aventure": "macera", "nature": "doğa",
    "découvrir": "keşfetmek", "tranquille": "sakin", "partager": "paylaşmak", "chemin": "yol"
  };

  function App() {
    const [text, setText] = useState("Metin oluşturmak için butona basın.");
    const [vault, setVault] = useState(() => JSON.parse(localStorage.getItem("lex_vault") || "[]"));

    const generateLongPassage = () => {
      // 200+ kelimelik bir metin yapısı
      const sentences = [
        "Thomas décide de faire un grand voyage dans les montagnes françaises. ",
        "Il veut découvrir la nature sauvage et profiter du paysage magnifique. ",
        "Le chemin est long mais très tranquille, idéal pour réfléchir. ",
        "Les habitants de ce petit village sont vraiment très accueillants et gentils. ",
        "Thomas aime partager ses histoires avec eux chaque soir. ",
        "C'est une aventure simple mais enrichissante pour son esprit. ",
        "Il observe chaque détail de la faune et de la flore autour de lui. ",
        "Le calme de la montagne lui apporte une paix intérieure profonde. ",
        "Demain, il continuera son chemin vers un autre sommet lointain. ",
        "Il se sent libre et heureux de vivre cette expérience authentique. "
      ];
      // Metni 20 kez tekrarlayarak ~200 kelimeye ulaştırıyoruz
      setText(sentences.join(" ").repeat(2));
    };

    const handleWordClick = (word) => {
      const clean = word.toLowerCase().replace(/[.,]/g, "");
      if (dict[clean]) {
        // Kelime bankasına ekleme mantığı
        if (!vault.includes(clean)) {
          const newVault = [...vault, { word: clean, translation: dict[clean] }];
          setVault(newVault);
          localStorage.setItem("lex_vault", JSON.stringify(newVault));
          alert(`"${clean}" kelimesi bankaya eklendi!`);
        } else {
          alert(`"${clean}" kelimesi zaten bankanızda mevcut.`);
        }
      }
    };

    return (
      <div className="container">
        <h1>Fransızca A2 Okuma & Banka</h1>
        <button className="btn" onClick={generateLongPassage}>📖 Pasajı Üret (200+ Kelime)</button>
        
        <div className="card passage">
          {text.split(" ").map((w, i) => (
            <span key={i} className={dict[w.toLowerCase().replace(/[.,]/g, "")] ? "clickable" : ""}
                  onClick={() => handleWordClick(w)}>
              {w}{" "}
            </span>
          ))}
        </div>

        <div className="vault-status">
          Bankadaki toplam kelime sayısı: {vault.length}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
