<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lexicon - A2 Pasaj</title>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: #1e293b; padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .passage { line-height: 1.8; font-size: 1.25rem; }
    .word { cursor: pointer; color: #38bdf8; border-bottom: 1px dashed #38bdf8; }
    .btn { background: #f472b6; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 20px; }
    .info { margin-top: 15px; padding: 10px; background: #000; border-left: 4px solid #f472b6; }
  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useState } = React;

  const dict = {
    "montagnes": "dağlar", "aventure": "macera", "découvrir": "keşfetmek", "paysage": "manzara",
    "habitants": "halk", "accueillants": "misafirperver", "tranquille": "sakin", "chemin": "yol",
    "nature": "doğa", "village": "köy", "randonnée": "doğa yürüyüşü", "magnifique": "muhteşem"
  };

  const sentenceBank = [
    "Thomas décide de faire un grand voyage dans les montagnes françaises. ",
    "Il veut découvrir la nature sauvage et profiter du paysage magnifique. ",
    "Le chemin est long mais très tranquille pour la randonnée. ",
    "Les habitants de ce petit village sont vraiment très accueillants. ",
    "Thomas aime partager ses histoires avec les habitants chaque soir. ",
    "C'est une vraie aventure simple pour découvrir la nature. ",
    "Il observe chaque détail du paysage autour de lui. ",
    "La montagne lui apporte une paix intérieure très profonde. "
  ];

  function App() {
    const [text, setText] = useState(() => sentenceBank.join(" "));
    const [info, setInfo] = useState(null);

    const generate = () => {
      let newText = [];
      for (let i = 0; i < 35; i++) {
        newText.push(sentenceBank[Math.floor(Math.random() * sentenceBank.length)]);
      }
      setText(newText.join(" "));
    };

    return (
      <div className="container">
        <h1>Fransızca A2 Okuma</h1>
        <button className="btn" onClick={generate}>YENİ PASAJ ÜRET</button>
        <div className="card">
          <div className="passage">
            {text.split(" ").map((w, i) => {
              const clean = w.toLowerCase().replace(/[.,]/g, "");
              const isWord = dict[clean];
              return (
                <span key={i} className={isWord ? "word" : ""} onClick={() => isWord && setInfo({w: clean, t: dict[clean]})}>
                  {w}{" "}
                </span>
              );
            })}
          </div>
        </div>
        {info && <div className="info"><strong>{info.w}</strong> = {info.t}</div>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
