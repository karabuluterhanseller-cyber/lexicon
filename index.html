<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lexicon - A2 Uzun Okuma</title>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; padding: 20px; line-height: 1.8; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: #1e293b; padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .passage { font-size: 1.25rem; }
    .clickable { color: #38bdf8; cursor: pointer; border-bottom: 2px dashed #38bdf8; font-weight: 500; }
    .btn { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    .info-box { margin-top: 20px; padding: 15px; background: #0f172a; border-left: 4px solid #38bdf8; }
  </style>
</head>
<body>

<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
  const { useState } = React;

  const dict = {
    "montagnes": "dağlar", "aventure": "macera", "découvrir": "keşfetmek", "paysage": "manzara",
    "habitants": "halk", "accueillants": "misafirperver", "tranquille": "sakin", "chemin": "yol",
    "nature": "doğa", "village": "köy", "randonnée": "doğa yürüyüşü", "magnifique": "muhteşem"
  };

  function App() {
    const [text, setText] = useState("Lütfen metin üretmek için aşağıdaki butona basın.");
    const [wordInfo, setWordInfo] = useState(null);

    const generateLongPassage = () => {
      const sentenceBank = [
        "Thomas décide de faire un grand voyage dans les montagnes françaises. ",
        "Il veut découvrir la nature sauvage et profiter du paysage magnifique. ",
        "Le chemin est long mais très tranquille pour la randonnée. ",
        "Les habitants de ce petit village sont vraiment très accueillants. ",
        "Thomas aime partager ses histoires avec les habitants chaque soir. ",
        "C'est une vraie aventure simple pour découvrir la nature. ",
        "Il observe chaque détail du paysage autour de lui. ",
        "La montagne lui apporte une paix intérieure très profonde. "
      ];
      
      // Her seferinde rastgele bir sıra oluşturup metni tazeliyoruz
      let newPassage = "";
      for (let i = 0; i < 30; i++) {
        newPassage += sentenceBank[Math.floor(Math.random() * sentenceBank.length)] + " ";
      }
      
      // Metni güncellerken metnin sonuna görünmez bir rastgele karakter ekliyoruz ki React değişimi garanti algılasın
      setText(newPassage + "  "); 
    };

    const handleWordClick = (word) => {
      const clean = word.toLowerCase().replace(/[.,]/g, "");
      if (dict[clean]) {
        setWordInfo({ fr: clean, tr: dict[clean] });
      }
    };

    return (
      <div className="container">
        <h1>Fransızca A2 Okuma & Banka</h1>
        <button className="btn" onClick={generateLongPassage}>📖 Yeni Pasaj Üret (200+ Kelime)</button>
        
        <div className="card passage">
          {text.split(" ").map((w, i) => (
            <span key={i} className={dict[w.toLowerCase().replace(/[.,]/g, "")] ? "clickable" : ""}
                  onClick={() => handleWordClick(w)}>
              {w}{" "}
            </span>
          ))}
        </div>

        {wordInfo && (
          <div className="info-box">
            <strong>{wordInfo.fr}</strong> → {wordInfo.tr}
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
