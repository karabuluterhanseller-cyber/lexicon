<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>A2 Okuma - Yapılandırılmış Metinler</title>
  <style>
    body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    .card { background: #1e293b; padding: 25px; border-radius: 12px; }
    .passage { line-height: 1.8; font-size: 1rem; }
    .word { cursor: pointer; color: #38bdf8; border-bottom: 1px dashed #38bdf8; }
    .btn { background: #f472b6; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 20px; }
    .info { margin-top: 20px; padding: 15px; background: #000; border-left: 4px solid #f472b6; }
  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useState } = React;

  // Gerçek sözlük
  const dict = {
    "le": "o/bu", "est": "dir", "voyage": "seyahat", "montagne": "dağ", "nature": "doğa",
    "tranquille": "sakin", "fleur": "çiçek", "soleil": "güneş", "travaille": "çalışır",
    "grand": "büyük", "petit": "küçük", "manger": "yemek", "ciel": "gökyüzü",
    "oiseau": "kuş", "maison": "ev", "ami": "arkadaş", "très": "çok", "beau": "güzel"
  };

  // Metin blokları (Artık rastgele kelime yok, hazır anlamlı paragraflar var)
  const textBlocks = [
    ["Thomas fait un grand voyage dans la montagne. Il observe un bel oiseau dans le ciel bleu.", "La nature est très tranquille. Marie travaille dans une maison avec beaucoup de fleurs."],
    ["Le soleil est très beau aujourd'hui. Mon ami veut manger dans un petit restaurant.", "C'est une expérience très enrichissante pour tout le monde dans cette ville."],
    ["La montagne est magnifique en hiver. Les enfants jouent dans la neige blanche.", "La cuisine française est célèbre dans le monde entier pour sa qualité."]
  ];

  function App() {
    const [currentText, setCurrentText] = useState(textBlocks[0]);
    const [selected, setSelected] = useState({ w: "", t: "" });

    const generate = () => {
      const randomBlock = textBlocks[Math.floor(Math.random() * textBlocks.length)];
      setCurrentText(randomBlock);
    };

    return (
      <div className="container">
        <button className="btn" onClick={generate}>YENİ ANLAMLI METİN ÜRET</button>
        <div className="card">
          <div className="passage">
            {currentText.map((p, pIdx) => (
              <p key={pIdx}>
                {p.split(" ").map((w, wIdx) => {
                  const clean = w.toLowerCase().replace(/[^a-zàâçéèêëîïôûù]/g, "");
                  return (
                    <span key={wIdx} className="word" onClick={() => setSelected({w, t: dict[clean] || "Sözlükte yok"})}>
                      {w}{" "}
                    </span>
                  );
                })}
              </p>
            ))}
          </div>
        </div>
        {selected.w && <div className="info"><strong>{selected.w}</strong>: {selected.t}</div>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
