<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lexicon - A2 Öğrenme Sistemi</title>
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    .card { background: #1e293b; padding: 25px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    .clickable { color: #38bdf8; cursor: pointer; border-bottom: 1px dashed #38bdf8; }
    .flashcard { background: #334155; padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; font-size: 1.5rem; }
    .btn { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  const fullDictionary = {
    "voyage": { tr: "seyahat", fr: "Action de se déplacer." },
    "montagne": { tr: "dağ", fr: "Élévation naturelle." },
    "époustouflant": { tr: "nefes kesici", fr: "Très impressionnant." },
    "village": { tr: "köy", fr: "Petite agglomération." }
  };

  function App() {
    const [vault, setVault] = useState(() => JSON.parse(localStorage.getItem("lex_vault") || "[]"));
    const [flashIndex, setFlashIndex] = useState(0);
    const [flipped, setFlipped] = useState(false);

    useEffect(() => {
      localStorage.setItem("lex_vault", JSON.stringify(vault));
    }, [vault]);

    const addToVault = (word) => {
      if (!vault.find(item => item.word === word)) {
        setVault([...vault, { word, ...fullDictionary[word] }]);
        alert(`${word} kelimesi hazneye eklendi!`);
      }
    };

    const text = "Thomas adore le voyage et veut voir la montagne. Le paysage est époustouflant, il visite un village.";

    return (
      <div className="container">
        <h1>Okuma Modu</h1>
        <div className="card">
          {text.split(" ").map((w, i) => {
            const clean = w.toLowerCase().replace(/[.,]/g, "");
            return (
              <span key={i} className={fullDictionary[clean] ? "clickable" : ""} 
                    onClick={() => fullDictionary[clean] && addToVault(clean)}>
                {w}{" "}
              </span>
            );
          })}
        </div>

        <h1>Flashcard Oyunu</h1>
        {vault.length > 0 ? (
          <div className="card flashcard" onClick={() => setFlipped(!flipped)}>
            {flipped ? vault[flashIndex].tr : vault[flashIndex].word}
            <div style={{marginTop: '20px'}}>
               <button className="btn" onClick={(e) => { e.stopPropagation(); setFlashIndex((flashIndex + 1) % vault.length); setFlipped(false); }}>Sonraki</button>
            </div>
          </div>
        ) : <p>Henüz kelime eklemedin, yukarıdaki metinden kelimelere tıkla!</p>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
