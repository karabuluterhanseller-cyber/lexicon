    const triggerSpeech = (text, targetLang) => {
      const synth = window.speechSynthesis;
      if (!synth) return;
      synth.cancel();
      const codeMap = { en: "en-US", fr: "fr-FR", de: "de-DE", es: "es-ES", ru: "ru-RU" };
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = codeMap[targetLang] || "en-US";
      utterance.rate = 0.85;
      synth.speak(utterance);
    };

        if (localMatch) {
          setSearchResult(localMatch);
        } else {
          setTimeout(() => {
            const simulatedTr = getDynamicTranslation(q);
            setSearchResult({
              word: q,
              meaning: "an integrated property or conceptual phenomenon within specified textual context",
              translation: simulatedTr,
              level: "Advanced",
              ipa: `/${q}/`,

        setUserVocabulary([...userVocabulary, record]);

      const initializeNextQuizQuestion = useCallback(() => {
        let pool = userVocabulary.filter(w => w.lang === targetLang && w.status !== "Mastered");
        
        if (pool.length < 4) {
          const presetsToAdd = (CORE_PRESETS[targetLang] || []).filter(p => !userVocabulary.some(uv => uv.word === p.word));
          pool = [...pool, ...presetsToAdd.map(p => ({ ...p, lang: targetLang, correctCount: 0, status: "Learning" }))];
        }

        if (quizLevelFilter !== "All") {
          pool = pool.filter(w => w.level === quizLevelFilter);
        }

        if (pool.length < 4) {
          pool = userVocabulary.filter(w => w.lang === targetLang) || [];
          const presetsToAdd = (CORE_PRESETS[targetLang] || []);
          pool = [...pool, ...presetsToAdd.map(p => ({ ...p, lang: targetLang, correctCount: 0, status: "Learning" }))];
        }

        let availableWords = pool.filter(w => !quizHistory.includes(w.word));
        if (availableWords.length === 0) availableWords = pool;

        const targetWord = availableWords[Math.floor(Math.random() * availableWords.length)];
        
        let distractorPool = pool.filter(w => w.word !== targetWord.word && w.level === targetWord.level);
        if (distractorPool.length < 3) distractorPool = pool.filter(w => w.word !== targetWord.word);
        
        const shuffledDistractors = [...distractorPool].sort(() => 0.5 - Math.random()).slice(0, 3);

        setQuizOptions(finalOptions);
        setSelectedAns(null);
        setQuizFeedback(null);

        if (known) {
          const updated = userVocabulary.map((w, idx) => {
            if (idx === fcIndex && w.lang === targetLang) {
              const nc = (w.correctCount || 0) + 1;
              let status = "Learning";
              if (nc >= 8) status = "Mastered";
              else if (nc >= 5) status = "Level 2";
              else if (nc >= 3) status = "Level 1";
              return { ...w, correctCount: nc, status };
            }
            return w;
          });
          setUserVocabulary(updated);
        }

        setFcRevealed(false);
        const nextIdx = fcIndex + 1;
        const validWords = userVocabulary.filter(w => w.lang === targetLang);

        if (nextIdx < validWords.length) {
          setFcIndex(nextIdx);
        } else {
          alert("Flashcard ısınma turu bitti! Şimdi quize aktarılıyorsunuz.");
          setActiveTab("quiz");
          initializeNextQuizQuestion();
        }
      };

      // KESİNTİSİZ PASAJ DEĞİŞTİRME MOTORU
      const generateClaudePassage = () => {
        setLoading(true);
        setHoveredWordInfo(null);
        setReadingAnswers({});
        setReadingScore(null);
        
        setTimeout(() => {
          const levelList = (READING_PASSAGES_POOL[readingLevel] || READING_PASSAGES_POOL["Intermediate"]).filter(p => p.lang === targetLang);
          
          // Rastgele bir indeks seç, eğer liste 1'den büyükse bir öncekiyle aynı olmasın
          let nextIdx = Math.floor(Math.random() * levelList.length);
          if (levelList.length > 1 && nextIdx === lastPassageIdx) {
            nextIdx = (nextIdx + 1) % levelList.length;
          }
          
          setLastPassageIdx(nextIdx);
          
          // Referansı tamamen kırmak için sığ kopyalama (Shallow Copy) yapıyoruz
          const selectedPassage = { ...levelList[nextIdx] };
          
          setPassageData(selectedPassage);
          setLoading(false);
        }, 350);
      };

      const handleWordClick = (rawWord) => {
        const clean = rawWord.toLowerCase().replace(/[^a-zåäöéèàùа-я]/g, "");
        if(!clean) return;

        const match = (CORE_PRESETS[targetLang] || []).find(w => w.word === clean) || {
          word: clean, 
          meaning: "Contextual term parsed from the generated text viewport.", 
          translation: getDynamicTranslation(clean), 
          level: readingLevel, 
          ipa: `/${clean}/`, 
          pos: "vocabulary", 
          etymology: "Context-driven translation framework.", 
          synonyms: []
        };
        setHoveredWordInfo(match);
      };

      const currentLangWords = userVocabulary.filter(w => w.lang === targetLang);
      const analyticsMetrics = (() => {
        const total = currentLangWords.length;
        const learning = currentLangWords.filter(w => w.status === "Learning").length;
        const lvl1 = currentLangWords.filter(w => w.status === "Level 1").length;
        const lvl2 = currentLangWords.filter(w => w.status === "Level 2").length;
        const mastered = currentLangWords.filter(w => w.status === "Mastered").length;
        return { total, learning, lvl1, lvl2, mastered };
      })();

      const activeTextLocale = UI_TEXTS[nativeLang] || UI_TEXTS["en"];

      if (!nativeLang) {
        return (
          <div className="onboarding-overlay">
            <div className="card" style={{ maxWidth: 460, width: "100%", textAlign: "center" }}>
              <h2 style={{ fontSize: 24, marginBottom: 8, color: "#5b8dee" }}>Lexicon</h2>
              <p style={{ color: "#a0a0c0", fontSize: 14, marginBottom: 24 }}>Ana dilinizi seçerek başlayın:</p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {NATIVE_LANGS.map(l => (
                  <button key={l.code} className="quiz-option" style={{ textAlign: "center", padding: 14 }} onClick={() => { setNativeLang(l.code); localStorage.setItem("lex_native", l.code); }}>
                    {l.name}
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="container">
          
          <div className="header">
            <h1>Lexicon</h1>
            <p>PREMIUM LANGUAGE LEARNING VAULT</p>
            <div style={{ position: "absolute", right: 0, top: 12, background: "rgba(245,166,35,0.1)", padding: "4px 10px", borderRadius: 8, color: "#f5a623", fontSize: 13, fontWeight: 700 }}>
              🔥 {streak} {activeTextLocale.streak}
            </div>
          </div>

          <div className="workspace-selector">
            <span style={{ fontSize: 13, color: "#a0a0c0", fontWeight: 500 }}>Hedef Dil Alanı:</span>
            <select className="input-field" style={{ width: "auto", padding: "6px 12px", height: "auto" }} value={targetLang} onChange={(e) => { setTargetLang(e.target.value); localStorage.setItem("lex_target", e.target.value); }}>
              {TARGET_LANGS.map(t => <option key={t.code} value={t.code}>{t.flag} {t.name}</option>)}
            </select>
          </div>

          <div className="nav-tabs">
            <button className={`tab-btn ${activeTab === 'search' ? 'active' : ''}`} onClick={() => setActiveTab("search")}>🔍 {activeTextLocale.search}</button>
            <button className={`tab-btn ${activeTab === 'vault' ? 'active' : ''}`} onClick={() => setActiveTab("vault")}>📚 {activeTextLocale.vault} ({currentLangWords.length})</button>
            <button className={`tab-btn ${activeTab === 'quiz' ? 'active' : ''}`} onClick={() => { setActiveTab("quiz"); initializeNextQuizQuestion(); }}>🎯 {activeTextLocale.quiz}</button>
            <button className={`tab-btn ${activeTab === 'flashcards' ? 'active' : ''}`} onClick={() => { setActiveTab("flashcards"); setFcIndex(0); setFcRevealed(false); }}>📇 {activeTextLocale.flashcards}</button>
            <button className={`tab-btn ${activeTab === 'reading' ? 'active' : ''}`} onClick={() => setActiveTab("reading")}>📖 {activeTextLocale.reading}</button>
            <button className={`tab-btn ${activeTab === 'analytics' ? 'active' : ''}`} onClick={() => setActiveTab("analytics")}>📊 {activeTextLocale.analytics}</button>
          </div>

          <div className="main-viewport">

            {/* TAB: SEARCH */}
            {activeTab === "search" && (
              <div>
                <div className="card">
                  <h2 style={{ fontSize: 18, marginBottom: 6 }}>Cambridge Tarzı Sözlük</h2>
                  <p style={{ color: "#a0a0c0", fontSize: 13, marginBottom: 16 }}>Kelime aratın, IPA okunuşunu ve etimolojisini anında görün.</p>
                  <div style={{ display: "flex", gap: 10 }}>
                    <input className="input-field" placeholder="Kelime yazın..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} onKeyDown={e => e.key === 'Enter' && executeDictionarySearch()} />
                    <button className="btn" onClick={executeDictionarySearch}>{loading ? "..." : "Ara"}</button>
                  </div>
                </div>

                {searchResult && (
                  <div className="card" style={{ borderLeft: "4px solid #5b8dee" }}>
                    <div className="flex-between">
                      <div>
                        <h3 style={{ fontSize: 24, fontWeight: 700 }}>{searchResult.word} <span style={{ fontSize: 15, color: "#a0a0c0", fontWeight: 400, marginLeft: 6 }}>{searchResult.ipa}</span></h3>
                        <div style={{ margin: "6px 0" }}><span className="badge" style={{ background: "rgba(91,200,250,0.15)", color: "#5ac8fa" }}>{searchResult.pos}</span></div>
                      </div>
                      <div className="flex-gap">
                        <button className="btn btn-secondary" onClick={() => triggerSpeech(searchResult.word, targetLang)}>🔊 Dinle</button>
                        <button className="btn" onClick={() => saveToVocabulary(searchResult)}>➕ Add to Vocabulary</button>
                      </div>
                    </div>

                    <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 12, borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 16 }}>
                      <div><strong>Tanım (EN):</strong> <span style={{ color: "#d1d1e0" }}>{searchResult.meaning}</span></div>
                      {nativeLang === "tr" && <div><strong>Türkçe Anlamı:</strong> <span style={{ color: "#4cd990", fontWeight: "600" }}>{searchResult.translation}</span></div>}
                      <div><strong>Etimoloji:</strong> <p style={{ fontSize: 13, color: "#f5a623", marginTop: 2 }}>{searchResult.etymology}</p></div>
                      <div>
                        <strong>Örnek Cümle:</strong>
                        <p style={{ fontStyle: "italic", color: "#a0a0c0", marginTop: 4 }}>"{searchResult.example}"</p>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* TAB: VAULT */}
            {activeTab === "vault" && (
              <div className="card">
                <h2 style={{ marginBottom: 16 }}>Kişisel Kelime Haznem</h2>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                  {currentLangWords.map((w, idx) => (
                    <div key={idx} style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 14, padding: 16 }}>
                      <div className="flex-between">
                        <strong style={{ fontSize: 17, color: "#5ac8fa" }}>{w.word}</strong>
                        <span className="badge" style={{ background: "rgba(76,217,144,0.12)", color: "#4cd990" }}>{w.status}</span>
                      </div>
                      <div style={{ fontSize: 13, color: "#a0a0c0", margin: "6px 0" }}>{w.meaning}</div>
                      <div style={{ fontSize: 13, color: "#4cd990", marginBottom: 4 }}>Anlamı: {w.translation}</div>
                      <div style={{ fontSize: 12, color: "#f5a623" }}>{w.etymology}</div>
                    </div>
                  ))}
                  {currentLangWords.length === 0 && <p style={{ color: "#606080", gridColumn: "1/-1", textAlign: "center", padding: 20 }}>Henüz kelime eklenmemiş.</p>}
                </div>
              </div>
            )}

            {/* TAB: QUIZ */}
            {activeTab === "quiz" && quizWord && (
              <div className="card">
                <div className="flex-between" style={{ marginBottom: 14 }}>
                  <h2>Çoktan Seçmeli Pratik</h2>
                  <select className="input-field" style={{ width: "auto", padding: "6px 12px" }} value={quizLevelFilter} onChange={e => setQuizLevelFilter(e.target.value)}>
                    <option value="All">Tüm Seviyeler</option>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Upper-Int">Upper-Int</option>
                    <option value="Advanced">Advanced</option>
                  </select>
                </div>

                <div style={{ background: "rgba(20,20,35,0.5)", padding: 24, borderRadius: 16, textAlign: "center", marginBottom: 20 }}>
                  <h3 style={{ fontSize: 22, fontWeight: 700, color: "#f1f1f7", lineHeight: "1.5" }}>
                    {(quizWord.historyCount || 0) >= 3 
                      ? `"${quizWord.word.toUpperCase()}" is essential for understanding this custom adaptive context sentence created dynamically.`
                      : `"${quizWord.example}"`
                    }
                  </h3>
                </div>

                <div className="quiz-grid">
                  {quizOptions.map((opt, i) => (
                    <button key={i} className="quiz-option" onClick={() => processQuizAnswer(opt)} style={{
                      borderColor: selectedAns ? (opt.word === quizWord.word ? "#4cd990" : selectedAns.word === opt.word ? "#f06080" : "rgba(255,255,255,0.06)") : "rgba(255,255,255,0.06)"
                    }}>
                      {opt.meaning} {nativeLang === "tr" && `(${opt.translation})`}
                    </button>
                  ))}
                </div>

                {quizFeedback && (
                  <div style={{ marginTop: 20, padding: 16, borderRadius: 12, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)" }}>
                    <h4 style={{ color: quizFeedback.success ? "#4cd990" : "#f06080", marginBottom: 6 }}>{quizFeedback.msg}</h4>
                    <p style={{ fontSize: 13, color: "#a0a0c0" }}><strong>Etimoloji:</strong> {quizWord.etymology}</p>
                    {quizWord.synonyms && <p style={{ fontSize: 13, color: "#5ac8fa", marginTop: 4 }}><strong>Eş Anlamlılar (Synonyms):</strong> {quizWord.synonyms.join(", ")}</p>}
                    <button className="btn" style={{ marginTop: 12, width: "100%" }} onClick={initializeNextQuizQuestion}>➔ Sıradaki Soru</button>
                  </div>
                )}
              </div>
            )}

            {/* TAB: FLASHCARD */}
            {activeTab === "flashcards" && (
              <div className="card" style={{ textAlign: "center", padding: "40px 24px" }}>
                <h2>Flashcard Isınma Modu</h2>
                <p style={{ color: "#a0a0c0", fontSize: 13, marginBottom: 24 }}>Quize geçmeden önce kelimeleri gözden geçirin.</p>
                
                {currentLangWords.length > 0 && fcIndex < currentLangWords.length ? (
                  <div style={{ background: "rgba(20,20,35,0.4)", borderRadius: 16, padding: 30, border: "1px solid rgba(255,255,255,0.05)" }}>
                    <h3 style={{ fontSize: 36, color: "#5b8dee", fontWeight: 700 }}>{currentLangWords[fcIndex].word}</h3>
                    <span style={{ fontSize: 14, color: "#606080" }}>{currentLangWords[fcIndex].ipa}</span>

                    {fcRevealed ? (
                      <div style={{ marginTop: 24, paddingTop: 20, borderTop: "1px solid rgba(255,255,255,0.06)", display: "flex", flexDirection: "column", gap: 8 }}>
                        <div><strong>Tanım:</strong> {currentLangWords[fcIndex].meaning}</div>
                        <div style={{ color: "#4cd990" }}><strong>Türkçe Karşılığı:</strong> {currentLangWords[fcIndex].translation}</div>
                        <div><strong>Etimoloji:</strong> {currentLangWords[fcIndex].etymology}</div>
                        <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 15 }}>
                          <button className="btn" style={{ background: "#4cd990" }} onClick={() => handleFlashcardVerdict(true)}>✓ {activeTextLocale.known}</button>
                          <button className="btn" style={{ background: "#f06080" }} onClick={() => handleFlashcardVerdict(false)}>✗ {activeTextLocale.unknown}</button>
                        </div>
                      </div>
                    ) : (
                      <div style={{ marginTop: 30 }}>
                        <button className="btn" onClick={() => setFcRevealed(true)}>{activeTextLocale.reveal}</button>
                      </div>
                    )}
                  </div>
                ) : (
                  <p style={{ color: "#a0a0c0" }}>Havuzunuzda kelime bulunmamaktadır.</p>
                )}
              </div>
            )}

            {/* TAB: READING */}
            {activeTab === "reading" && (
              <div className="card">
                <div className="flex-between" style={{ marginBottom: 16 }}>
                  <h2>Claude Seviyeli Okuma Pasajı</h2>
                  <div className="flex-gap">
                    <select className="input-field" style={{ width: "auto", padding: 8 }} value={readingLevel} onChange={e => setReadingLevel(e.target.value)}>
                      <option value="Beginner">Beginner</option>
                      <option value="Intermediate">Intermediate</option>
                      <option value="Upper-Int">Upper-Int</option>
                      <option value="Advanced">Advanced</option>
                    </select>
                    <button className="btn" onClick={generateClaudePassage}>{loading ? "Üretiliyor..." : "Metin Üret"}</button>
                  </div>
                </div>

                {passageData && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                    <div className="passage-body" style={{ padding: 22, background: "rgba(20,20,35,0.4)", borderRadius: 14 }}>
                      <h3 style={{ color: "#f5a623", marginBottom: 14 }}>{passageData.title}</h3>
                      {passageData.paragraphs.map((para, pIdx) => (
                        <p key={pIdx}>
                          {para.split(" ").map((w, i) => (
                            <span key={i} className="clickable-word" onClick={() => handleWordClick(w)}>{w} </span>
                          ))}
                        </p>
                      ))}
                    </div>

                    {hoveredWordInfo && (
                      <div style={{ padding: 14, background: "rgba(91,141,238,0.1)", borderRadius: 10, border: "1px dashed #5b8dee" }}>
                        <div className="flex-between">
                          <strong style={{ fontSize: 16 }}>Kelime Detayı: <span style={{ color: "#5ac8fa" }}>{hoveredWordInfo.word}</span></strong>
                          <button className="btn" style={{ padding: '4px 8px', fontSize: 12 }} onClick={() => saveToVocabulary(hoveredWordInfo)}>Havuza Ekle</button>
                        </div>
                        <p style={{ fontSize: 14, marginTop: 6, color: "#4cd990", fontWeight: "600" }}>
                          Türkçe Anlamı: {hoveredWordInfo.translation}
                        </p>
                        <p style={{ fontSize: 13, marginTop: 2, color: "#a0a0c0" }}>Tanım (EN): {hoveredWordInfo.meaning}</p>
                      </div>
                    )}

                    <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 16 }}>
                      <h4 style={{ marginBottom: 14, color: "#5ac8fa" }}>Okuduğunu Anlama Soruları (3 Adet):</h4>
                      {passageData.questions.map((q, idx) => (
                        <div key={idx} style={{ marginBottom: 18, background: "rgba(255,255,255,0.01)", padding: 12, borderRadius: 10 }}>
                          <p style={{ fontSize: 14, marginBottom: 8, fontWeight: "500" }}>{idx + 1}. {q.q}</p>
                          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                            {q.opts.map((o, oid) => (
                              <button key={oid} className="btn btn-secondary" style={{
                                padding: "8px 14px", fontSize: "13px",
                                background: readingAnswers[q.id] === o ? "#5b8dee" : "rgba(255,255,255,0.03)"
                              }} onClick={() => setReadingAnswers({ ...readingAnswers, [q.id]: o })}>
                                {o}
                              </button>
                            ))}
                          </div>
                        </div>
                      ))}
                      <button className="btn" style={{ width: "100%", marginTop: 10 }} onClick={() => {
                        let score = 0;
                        passageData.questions.forEach(q => { if(readingAnswers[q.id] === q.correct) score++; });
                        setReadingScore(score);
                      }}>Cevapları Gönder</button>

                      {readingScore !== null && (
                        <p style={{ marginTop: 14, textAlign: "center", color: "#4cd990", fontWeight: 700, fontSize: "16px" }}>Sonuç: {passageData.questions.length} sorudan {readingScore} doğru cevap!</p>
                      )}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* TAB: ANALYTICS */}
            {activeTab === "analytics" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                  <div className="card" style={{ textAlign: "center" }}>
                    <h3>Toplam Kelime</h3>
                    <div style={{ fontSize: 44, fontWeight: 800, color: "#5b8dee", margin: "8px 0" }}>{analyticsMetrics.total}</div>
                  </div>
                  <div className="card" style={{ textAlign: "center" }}>
                    <h3>Mastered (Öğrenilenler)</h3>
                    <div style={{ fontSize: 44, fontWeight: 800, color: "#4cd990", margin: "8px 0" }}>{analyticsMetrics.mastered}</div>
                  </div>
                </div>

                <div className="card">
                  <h3 style={{ marginBottom: 12 }}>Seviye Dağılımı</h3>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    <div>Learning Aşaması: <strong>{analyticsMetrics.learning}</strong></div>
                    <div>Level 1 Aşaması: <strong>{analyticsMetrics.lvl1}</strong></div>
                    <div>Level 2 Aşaması: <strong>{analyticsMetrics.lvl2}</strong></div>
                    <div>Mastered Aşaması: <strong>{analyticsMetrics.mastered}</strong></div>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
