<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>A2 Okuma - Profesyonel Yapı</title>
  <style>
    body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: #1e293b; padding: 30px; border-radius: 12px; }
    .passage { line-height: 1.8; font-size: 1.1rem; }
    .word { cursor: pointer; color: #38bdf8; border-bottom: 1px dashed #38bdf8; }
    .btn { background: #f472b6; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 20px; }
    .info { margin-top: 20px; padding: 15px; background: #000; border-left: 4px solid #f472b6; font-size: 1rem; }
  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useState } = React;

  const dict = {
    "voyage": "seyahat", "montagne": "dağ", "nature": "doğa", "tranquille": "sakin",
    "fleur": "çiçek", "soleil": "güneş", "travaille": "çalışır", "grand": "büyük",
    "petit": "küçük", "manger": "yemek", "ciel": "gökyüzü", "oiseau": "kuş",
    "maison": "ev", "ami": "arkadaş", "très": "çok", "beau": "güzel"
  };

  const articles = [
    {
      title: "La vie à la campagne",
      text: "Thomas aime passer ses journées dans la nature. Il habite dans une petite maison avec un grand jardin. Chaque matin, il observe le soleil qui se lève sur les montagnes. Il travaille beaucoup dans son potager pour avoir des légumes frais. C'est une vie simple et très tranquille pour lui. Il ne veut pas retourner à la grande ville avec tout son bruit."
    },
    {
      title: "Un voyage inoubliable",
      text: "Marie a décidé de faire un long voyage en France. Elle veut découvrir chaque région et chaque culture différente. Elle mange des plats délicieux dans les petits restaurants locaux. Elle prend beaucoup de photos du ciel bleu et des oiseaux. C'est une expérience très enrichissante qui change sa façon de voir le monde."
    }
  ];

  function App() {
    const [article, setArticle] = useState(articles[0]);
    const [selected, setSelected] = useState({ word: "", meaning: "" });

    const handleWordClick = (word) => {
      const clean = word.toLowerCase().replace(/[^a-zàâçéèêëîïôûù]/g, "");
      setSelected({ word: clean, meaning: dict[clean] || "Sözlükte bulunamadı" });
    };

    return (
      <div className="container">
        <button className="btn" onClick={() => setArticle(articles[Math.floor(Math.random() * articles.length)])}>
          YENİ METİN ÜRET
        </button>
        
        <div className="card">
          <h1>{article.title}</h1>
          <div className="passage">
            {article.text.split(" ").map((w, i) => (
              <span key={i} className="word" onClick={() => handleWordClick(w)}>
                {w}{" "}
              </span>
            ))}
          </div>
        </div>

        {selected.word && (
          <div className="info">
            <strong>{selected.word}</strong>: {selected.meaning}
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
