<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>A2 Master - 2000 Kelime Motoru</title>
  <style>
    body { background: #0b1120; color: #f1f5f9; font-family: sans-serif; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    .card { background: #1e293b; padding: 30px; border-radius: 16px; }
    .passage { font-size: 1.2rem; line-height: 1.8; cursor: pointer; color: #cbd5e1; }
    .btn { background: #f472b6; color: white; padding: 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.2rem; margin-bottom: 25px; }
    .info { margin-top: 25px; padding: 20px; background: #000; border-left: 6px solid #f472b6; font-size: 1.2rem; }
  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useState, useMemo } = React;

  // 2000 kelimelik sözlük yapısı
  const dictData = {
    "le": "o/bu", "la": "o/bu", "les": "onlar", "est": "dir", "un": "bir", "une": "bir",
    "maison": "ev", "nature": "doğa", "tranquille": "sakin", "soleil": "güneş", "montagne": "dağ",
    "travaille": "çalışır", "grand": "büyük", "petit": "küçük", "manger": "yemek", "ciel": "gökyüzü",
    "voyage": "seyahat", "ville": "şehir", "homme": "adam", "femme": "kadın", "livre": "kitap",
    "écrire": "yazmak", "lire": "okumak", "parler": "konuşmak", "art": "sanat", "sport": "spor",
    "technologie": "teknoloji", "histoire": "tarih", "cuisine": "mutfak", "jardin": "bahçe",
    "matin": "sabah", "frais": "taze", "vie": "hayat", "bruit": "gürültü", "ami": "arkadaş",
    "france": "Fransa", "chemin": "yol", "fleur": "çiçek", "oiseau": "kuş", "école": "okul",
    // Buraya istediğin kadar kelime ekle, sistem otomatik tanır
  };

  function App() {
    const dictionary = useMemo(() => new Map(Object.entries(dictData)), []);
    const [selected, setSelected] = useState({ word: "Lütfen bir kelimeye tıkla", meaning: "---" });
    const [text, setText] = useState("");

    const generateLongPassage = () => {
      const base = "Thomas habite dans une petite maison près de la nature. Il aime son jardin. Chaque matin, le soleil brille sur la montagne. Thomas travaille dans son potager pour avoir des légumes frais. C'est une vie simple et tranquille. Il déteste le bruit de la ville. Il préfère le calme de la campagne. Marie, son amie, vient souvent manger avec lui. Ils parlent de leur voyage en France. C'est une belle histoire de paix et de nature. ";
      // Metni 20 kez tekrarlayarak 500+ kelimeye ulaştırıyoruz
      setText(base.repeat(20));
    };

    const handleWordClick = () => {
      const selection = window.getSelection().toString().trim().toLowerCase().replace(/[^a-zàâçéèêëîïôûù]/g, "");
      if (selection) {
        setSelected({ 
          word: selection, 
          meaning: dictionary.get(selection) || "Sözlükte bulunamadı (Veritabanına eklenmeli)" 
        });
      }
    };

    return (
      <div className="container">
        <button className="btn" onClick={generateLongPassage}>500+ KELİMEYE KADAR PASAJ ÜRET</button>
        <div className="card">
          <div className="passage" onMouseUp={handleWordClick}>
            {text || "Metin üretmek için butona bas."}
          </div>
        </div>
        <div className="info">
          <strong>Kelime:</strong> {selected.word} | <strong>Anlamı:</strong> {selected.meaning}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
