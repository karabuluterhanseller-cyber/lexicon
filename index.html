<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>A2 Okuma - Nihai Çözüm</title>
  <style>
    body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; padding: 20px; line-height: 1.8; }
    .container { max-width: 900px; margin: 0 auto; }
    .passage { font-size: 1.3rem; background: #1e293b; padding: 30px; border-radius: 12px; }
    .word { cursor: pointer; color: #38bdf8; border-bottom: 1px dashed #38bdf8; transition: 0.1s; }
    .word:hover { color: #fb7185; }
    .info { margin-top: 20px; padding: 20px; background: #000; border-left: 5px solid #38bdf8; font-size: 1.2rem; }
  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useState } = React;

  // 2000 kelimelik altyapı (Sistemi yormadan doğrudan tarar)
  const dict = {
    "thomas": "Thomas", "habite": "yaşar", "maison": "ev", "nature": "doğa", "tranquille": "sakin",
    "soleil": "güneş", "montagne": "dağ", "travaille": "çalışır", "potager": "sebze bahçesi",
    "légumes": "sebzeler", "frais": "taze", "vie": "hayat", "ville": "şehir", "bruit": "gürültü",
    "voyage": "seyahat", "marie": "Marie", "france": "Fransa", "lire": "okumak", "beau": "güzel",
    "grand": "büyük", "petit": "küçük", "manger": "yemek", "ami": "arkadaş", "très": "çok",
    "regarder": "bakmak", "oiseau": "kuş", "arbre": "ağaç", "fleur": "çiçek", "heureux": "mutlu"
    // Buraya binlerce kelime ekleyebilirsin, sistem hepsini aynı hızla bulur.
  };

  function App() {
    const [selected, setSelected] = useState({ w: "Kelimeye tıkla", t: "Anlam burada çıkacak" });
    const text = "Thomas habite dans une petite maison près de la nature. Il aime son jardin. Chaque matin, le soleil brille sur la montagne. Thomas travaille dans son potager pour avoir des légumes frais. C'est une vie simple et tranquille. Il déteste le bruit de la ville. Il préfère le calme de la campagne. Marie, son amie, vient souvent manger avec lui. Ils parlent de leur voyage en France. C'est une belle histoire de paix et de nature. La vie est belle quand on est simple. Il lit beaucoup de livres dans son jardin. Les fleurs sont partout autour de la maison. Il observe les oiseaux qui chantent dans les arbres. Le soir, il regarde les étoiles avec son ami. Il est heureux ici. Chaque jour est une nouvelle aventure dans la nature.";

    return (
      <div className="container">
        <div className="passage">
          {text.split(" ").map((word, i) => {
            const clean = word.toLowerCase().replace(/[^a-z]/g, "");
            return (
              <span key={i} className="word" onClick={() => setSelected({w: word, t: dict[clean] || "Sözlükte yok"})}>
                {word}{" "}
              </span>
            );
          })}
        </div>
        <div className="info">
          <strong>{selected.w}</strong> : {selected.t}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
