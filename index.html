<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Lexicon Pro - A2 Okuma</title>
  <style>
    body { background: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; line-height: 1.8; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .passage { font-size: 1.15rem; }
    .word { cursor: pointer; color: #38bdf8; border-bottom: 1px dashed #38bdf8; transition: 0.2s; }
    .word:hover { color: #f472b6; border-color: #f472b6; }
    .btn { background: #38bdf8; color: #000; border: none; padding: 18px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; margin-bottom: 25px; }
    .info { margin-top: 25px; padding: 20px; background: #020617; border-left: 5px solid #38bdf8; font-size: 1.1rem; }
  </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
  const { useState } = React;

  // Genişletilmiş Kelime Bankası
  const dict = {
    "vie": "hayat", "campagne": "kırsal", "nature": "doğa", "voyage": "seyahat",
    "montagne": "dağ", "soleil": "güneş", "maison": "ev", "ami": "arkadaş",
    "fleur": "çiçek", "tranquille": "sakin", "travaille": "çalışır", "grand": "büyük",
    "manger": "yemek", "ciel": "gökyüzü", "oiseau": "kuş", "ville": "şehir",
    "histoire": "tarih", "médias": "medya", "sport": "spor", "technologie": "teknoloji"
  };

  // Cümle havuzları (Konu bazlı)
  const topics = {
    "Doğa": ["Thomas habite dans une maison près de la nature.", "La montagne est très tranquille chaque matin.", "Il adore regarder le soleil sur les fleurs."],
    "Şehir": ["La vie dans la grande ville est très rapide.", "Il y a beaucoup de bruit et de voitures partout.", "Marie préfère travailler dans un bureau calme."],
    "Seyahat": ["Un voyage en France est une aventure incroyable.", "On peut manger dans des restaurants magnifiques.", "Le ciel bleu est parfait pour les photos."]
  };

  function App() {
    const [article, setArticle] = useState({ title: "Başlat", paragraphs: [] });
    const [selected, setSelected] = useState({ word: "", meaning: "" });

    const generate = () => {
      const keys = Object.keys(topics);
      const title = keys[Math.floor(Math.random() * keys.length)];
      let paragraphs = [];
      
      // 4 paragraflı, 300 kelimeye yakın uzun metin üret
      for(let i=0; i<4; i++) {
        let p = "";
        for(let j=0; j<12; j++) {
          p += topics[title][Math.floor(Math.random() * topics[title].length)] + " ";
        }
        paragraphs.push(p);
      }
      setArticle({ title, paragraphs });
    };

    return (
      <div className="container">
        <button className="btn" onClick={generate}>YEPYENİ 300 KELİMEYE KADAR PASAJ ÜRET</button>
        
        <div className="card">
          <h1 style={{color: '#38bdf8'}}>{article.title}</h1>
          <div className="passage">
            {article.paragraphs.map((p, pIdx) => (
              <p key={pIdx}>
                {p.split(" ").map((w, wIdx) => {
                  const clean = w.toLowerCase().replace(/[^a-zàâçéèêëîïôûù]/g, "");
                  return (
                    <span key={wIdx} className="word" onClick={() => setSelected({word: clean, meaning: dict[clean] || "Sözlükte yok"})}>
                      {w}{" "}
                    </span>
                  );
                })}
              </p>
            ))}
          </div>
        </div>

        {selected.word && (
          <div className="info">
            <strong>{selected.word}</strong>: {selected.meaning}
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
