// Web Speech API - plays audio directly in browser, no external site needed
const speak = (text, lang) => {
  const synth = window.speechSynthesis;
  if (!synth) return;
  const fullCode = { en: "en-GB", fr: "fr-FR", de: "de-DE", es: "es-ES", ru: "ru-RU" }[lang] || "en-US";
  const doSpeak = () => {
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = fullCode;
    u.rate = 0.82;
    const voices = synth.getVoices();
    const voice = voices.find(v => v.lang === fullCode)
      || voices.find(v => v.lang.startsWith(fullCode.split("-")[0]))
      || voices[0];
    if (voice) u.voice = voice;
    synth.speak(u);
  };
  // Voices may not be loaded yet on first call
  if (synth.getVoices().length > 0) {
    doSpeak();
  } else {
    synth.addEventListener("voiceschanged", doSpeak, { once: true });
  }
};

// Fetch translation from Claude API

const fetchTranslation = async (text, fromLang, toLang) => {
  try {
    const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang}|${toLang}`);
    const data = await res.json();
    return data?.responseData?.translatedText || null;
  } catch (e) {
    console.error("translation error", e);
    return null;
  }
};

const fetchDefinition = async (word, lang, nativeLangLabel = 'Turkish') => {
  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/${lang}/${encodeURIComponent(word)}`);

    if (!res.ok) throw new Error("Word not found");

    const data = await res.json();
    const entry = data[0];

    const meanings = entry.meanings || [];
    const firstMeaning = meanings[0] || {};
    const firstDef = (firstMeaning.definitions || [])[0] || {};

    const examples = [];

    meanings.forEach(m => {
      (m.definitions || []).forEach(d => {
        if (d.example && examples.length < 2) {
          examples.push(d.example);
        }
      });
    });

    if (examples.length === 0) {
      examples.push(`${word} is commonly used in everyday language.`);
      examples.push(`Learning the word ${word} improves vocabulary skills.`);
    }

    const tr = await fetchTranslation(
      firstDef.definition || word,
      "en",
      "tr"
    );

    return {
      word: entry.word || word,
      definition: firstDef.definition || "No definition found.",
      examples,
      pronunciation:
        entry.phonetic ||
        (entry.phonetics && entry.phonetics[0]?.text) ||
        "/-/",
      partOfSpeech: firstMeaning.partOfSpeech || "word",
      etymology: "Online dictionary source.",
      nativeTranslation: tr || "Çeviri bulunamadı"
    };
  } catch (e) {
    console.error("fetchDefinition error", e);

    return {
      word,
      definition: "Kelime bulunamadı.",
      examples: [
        `${word} could not be loaded from the dictionary.`,
        `Try another spelling for ${word}.`
      ],
      pronunciation: "/-/",
      partOfSpeech: "unknown",
      etymology: "Unavailable",
      nativeTranslation: "Bulunamadı"
    };
  }
};


const fetchSynonymsAndEtymology = async (word, lang, hasEtymology) => {
  try {
    const langLabel = SUPPORTED_LANGS.find(l => l.code === lang)?.label || "English";
    const prompt = hasEtymology
      ? `Give 3-5 synonyms for the ${langLabel} word "${word}". Respond ONLY as a JSON array of strings.`
      : `For the ${langLabel} word "${word}", give synonyms and etymology. Respond ONLY as JSON: {"synonyms":["..."],"etymology":"..."}`;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 300, messages: [{ role: "user", content: prompt }] })
    });
    const data = await res.json();
    const text = data.content?.map(c => c.text || "").join("").trim().replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(text);
    return Array.isArray(parsed) ? { synonyms: parsed, etymology: null } : parsed;
  } catch { return { synonyms: [], etymology: null }; }
};

const fetchQuizSentence = async (word, lang) => {
  try {
    const langLabel = SUPPORTED_LANGS.find(l => l.code === lang)?.label || "English";
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 200,
        messages: [{ role: "user", content: `Write ONE natural ${langLabel} sentence (15-25 words) that uses the word "${word}" in a meaningful context. The sentence should give strong contextual clues about the word's meaning. Respond with ONLY the sentence, nothing else.` }]
      })
    });
    const data = await res.json();
    return data.content?.map(c => c.text || "").join("").trim() || null;
  } catch { return null; }
};

      "",
      "Respond ONLY as raw JSON, no markdown backticks whatsoever:",
      '{"title":"...","passage":"long paragraph 1 text here\n\nlong paragraph 2 text here","questions":[{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"A"},{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"B"},{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":"C"}]}'
    ].join("\n");

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const raw = (data.content || []).map(c => c.text || "").join("").trim();
    const clean = raw.replace(/^```[\w]*\s*/m, "").replace(/\s*```$/m, "").trim();
    const match = clean.match(/\{[\s\S]*\}/);
    if (!match) { console.error("No JSON:", raw.slice(0,300)); return null; }
    const parsed = JSON.parse(match[0]);
    if (!parsed.passage || !Array.isArray(parsed.questions)) throw new Error("Invalid");
    return { ...parsed, id: Date.now() };
  } catch(e) { console.error("fetchPassage error:", e); return null; }
};

  de: ["ä","ö","ü","ß","Ä","Ö","Ü"],
  es: ["á","é","í","ó","ú","ñ","ü","¿","¡","Á","É","Í","Ó","Ú","Ñ"],

function LexiconApp() {
  const [view, setView] = useState("home");
  const [lang, setLang] = useState("en");
  const [vocabulary, setVocabulary] = useState({});
  const [searchWord, setSearchWord] = useState("");
  const [searchResult, setSearchResult] = useState(null);
  const [searching, setSearching] = useState(false);
  const [translations, setTranslations] = useState({});
  const [speakError, setSpeakError] = useState(false);
  const [wordTranslation, setWordTranslation] = useState(null);
  // Reading
  const [passage, setPassage] = useState(null);
  const [passageLoading, setPassageLoading] = useState(false);
  const [passageLevel, setPassageLevel] = useState("Intermediate");
  const [selectedWord, setSelectedWord] = useState(null);
  const [wordPopup, setWordPopup] = useState(null);
  const [wordPopupLoading, setWordPopupLoading] = useState(false);
  const [quizAnswers, setQuizAnswers] = useState({});
  const [quizSubmitted, setQuizSubmitted] = useState(false);
  const [nativeLang, setNativeLang] = useState(null); // user's mother tongue
  const [quizState, setQuizState] = useState(null);
  const [quizAnswer, setQuizAnswer] = useState("");
  const [quizFeedback, setQuizFeedback] = useState(null);
  const [includePacks, setIncludePacks] = useState(true);
  const [selectedLevel, setSelectedLevel] = useState(null); // null = no level pack
  const recentWords = useRef([]);
  const sentenceCache = useRef({}); // word -> [sentence1, sentence2, ...]
  const questionCount = useRef(0); // total questions asked this session
  const [flashPool, setFlashPool] = useState([]);
  const [flashIndex, setFlashIndex] = useState(0);
  const [flashRevealed, setFlashRevealed] = useState(false);
  const [flashThenQuiz, setFlashThenQuiz] = useState(false);
  const [flashTranslation, setFlashTranslation] = useState(null);
  const [streak, setStreak] = useState(0);
  const [lastActive, setLastActive] = useState(null);
  const [activeFilter, setActiveFilter] = useState("all");
  const [notification, setNotification] = useState(null);

  useEffect(() => {
    try {
      const sv = localStorage.getItem("lexicon_vocab");
      if (sv) setVocabulary(JSON.parse(sv));
      const nl = localStorage.getItem("lexicon_native_lang");
      if (nl) setNativeLang(nl);
      const sl = localStorage.getItem("lexicon_level");
      if (sl) setSelectedLevel(sl);
      const ss = localStorage.getItem("lexicon_streak");
      if (ss) {
        const { count, date } = JSON.parse(ss);
        const yesterday = new Date(Date.now() - 86400000).toISOString().split("T")[0];
        if (date === todayStr() || date === yesterday) { setStreak(count); setLastActive(date); }
      }
    } catch {}
  }, []);

  const saveVocab = v => { setVocabulary(v); try { localStorage.setItem("lexicon_vocab", JSON.stringify(v)); } catch {} };

  const recordActivity = () => {
    const today = todayStr();
    if (lastActive === today) return;
    const yesterday = new Date(Date.now() - 86400000).toISOString().split("T")[0];
    const n = lastActive === yesterday ? streak + 1 : 1;
    setStreak(n); setLastActive(today);
    try { localStorage.setItem("lexicon_streak", JSON.stringify({ count: n, date: today })); } catch {}
    if (n > 1) notify(`🔥 ${n} day streak!`, "streak");
  };

  const notify = (msg, type = "success") => { setNotification({ msg, type }); setTimeout(() => setNotification(null), 3000); };

  const loadPassage = async () => {
    setPassageLoading(true);

    // force rerender
    setPassage(null);

    setSelectedWord(null);
    setWordPopup(null);
    setWordPopupLoading(false);
    setQuizAnswers({});
    setQuizSubmitted(false);

    try {
      const p = await fetchPassage(lang, passageLevel);

      if (p && p.passage && p.questions) {
        setTimeout(() => {
          setPassage({ ...p, id: Date.now() });
        }, 0);
      } else {
        setPassage({ error: true, id: Date.now() });
      }
    } catch(e) {
      setPassage({ error: true, id: Date.now() });
    }

    setPassageLoading(false);
  };

  const handleWordClick = async (word) => {
    // Strip punctuation
    const clean = word.replace(/[^\w\u00C0-\u024F\u0400-\u04FF]/g, "");
    if (!clean || clean.length < 3) return;
    setSelectedWord(clean);
    setWordPopup(null);
    setWordPopupLoading(true);
    const activeLang = nativeLang || "tr";
    const nativeLangLabel = NATIVE_LANGS.find(l => l.code === activeLang)?.label || "Turkish";
    const def = await fetchDefinition(clean, lang, nativeLangLabel);
    if (def) {
      setWordPopup({ ...def, lang });
      // fetch translation separately
      fetchTranslation(clean, lang, activeLang).then(tr => {
        setWordPopup(prev => prev ? { ...prev, nativeTranslation: tr } : prev);
      });
    }
    setWordPopupLoading(false);
  };

  const addPopupWordToVocab = () => {
    if (!wordPopup) return;
    addToVocab({ ...wordPopup, lang });
  };

  const getAllQuizWords = useCallback(() => {
    let words = Object.values(vocabulary).filter(w => w.lang === lang && (w.correct || 0) < 8);
    if (includePacks) {
      const packs = (PRESET_PACKS[lang] || []).map(p => ({ ...p, lang, correct: 0, incorrect: 0, source: "pack", definition: p.meaning }));
      words = [...words, ...packs.filter(p => !vocabulary[`${lang}:${p.word.toLowerCase()}`])];
    }
    if (selectedLevel && LEVEL_PACKS[lang]?.[selectedLevel]) {
      const levelWords = LEVEL_PACKS[lang][selectedLevel].map(p => ({ ...p, lang, correct: 0, incorrect: 0, source: "level", definition: p.meaning }));
      words = [...words, ...levelWords.filter(p => !vocabulary[`${lang}:${p.word.toLowerCase()}`] && !words.find(w => w.word === p.word))];
    }
    return words;
  }, [vocabulary, lang, includePacks, selectedLevel]);

  const handleSearch = async () => {
    if (!searchWord.trim()) return;
    setSearching(true); setSearchResult(null); setWordTranslation(null);
    const activeLang = nativeLang || "tr";
    const nativeLangLabel = NATIVE_LANGS.find(l => l.code === activeLang)?.label || "Turkish";
    const def = await fetchDefinition(searchWord.trim(), lang, nativeLangLabel);
    const result = def ? { ...def, lang } : { error: true, word: searchWord.trim() };
    setSearchResult(result);
    setSearching(false);
    // Always fetch translation separately — guaranteed to arrive
    if (def) {
      setWordTranslation("...");
      const tr = await fetchTranslation(def.word, lang, activeLang);
      setWordTranslation(tr || def.nativeTranslation || null);
    }
  };

  const setAndSaveNativeLang = (code) => {
    setNativeLang(code);
    try { localStorage.setItem("lexicon_native_lang", code); } catch {}
  };

  const setAndSaveLevel = (level) => {
    setSelectedLevel(level);
    try { localStorage.setItem("lexicon_level", level || ""); } catch {}
  };

  const handleSpeak = (text, lang) => {
    speak(text, lang);
  };

  const getTranslation = async (text, fromLang, key) => {
    if (translations[key]) return;
    setTranslations(prev => ({ ...prev, [key]: "..." }));
    const tr = await fetchTranslation(text, fromLang, nativeLang || "tr");
    setTranslations(prev => ({ ...prev, [key]: tr || "—" }));
  };

  const addToVocab = entry => {
    const key = `${entry.lang}:${entry.word.toLowerCase()}`;
    if (vocabulary[key]) { notify("Already in vocabulary!", "info"); return; }
    saveVocab({ ...vocabulary, [key]: { ...entry, addedAt: Date.now(), correct: 0, incorrect: 0, lastQuizzed: null, source: "search" } });
    notify(`"${entry.word}" added!`);
  };

  // ── FLASHCARDS ──
  const startFlashcards = (thenQuiz = false) => {
    const pool = getAllQuizWords();
    if (!pool.length) { notify("No words available!", "info"); return; }
    setFlashPool(pool.sort(() => Math.random() - 0.5));
    setFlashIndex(0); setFlashRevealed(false); setFlashThenQuiz(thenQuiz); setFlashTranslation(null);
    setView("flashcard");
  };

  const flashNext = () => {
    if (flashIndex + 1 >= flashPool.length) {
      if (flashThenQuiz) startQuiz();
      else { notify("All cards reviewed! 🎉"); setView("home"); }
      return;
    }
    setFlashIndex(i => i + 1); setFlashRevealed(false); setFlashTranslation(null);
  };

  const flashKnew = () => {
    const w = flashPool[flashIndex];
    const key = `${lang}:${w.word.toLowerCase()}`;
    if (vocabulary[key]) saveVocab({ ...vocabulary, [key]: { ...vocabulary[key], correct: (vocabulary[key].correct || 0) + 1, lastQuizzed: Date.now() } });
    flashNext();
  };

  // ── QUIZ ──
  const startQuiz = () => {
    const words = getAllQuizWords();
    if (words.length < 2) { notify("Need at least 2 words!", "info"); return; }
    recordActivity(); recentWords.current = [];
    nextQuestion(words); setView("quiz");
  };

  const nextQuestion = async (words) => {
    const pool = words || getAllQuizWords();
    if (pool.length < 2) { setQuizState(null); return; }
    const weighted = pool.flatMap(w => Array(w.correct >= 5 ? 1 : w.correct >= 3 ? 2 : 4).fill(w));
    const LIMIT = Math.min(5, Math.floor(pool.length / 2));
    const recent = recentWords.current;
    const candidates = weighted.filter(w => !recent.includes(w.word));
    const source = candidates.length >= 2 ? candidates : weighted;
    const target = source[Math.floor(Math.random() * source.length)];
    recentWords.current = [target.word, ...recent].slice(0, LIMIT);
    // Pick distractors from same level/source as target to keep difficulty consistent
    const targetLevel = target.source || "search";
    const sameLevel = pool.filter(w => w.word !== target.word && (w.source === targetLevel || pool.filter(x => x.source === targetLevel).length < 4));
    const distractor_pool = sameLevel.length >= 3 ? sameLevel : pool.filter(w => w.word !== target.word);
    const others = distractor_pool.sort(() => Math.random() - 0.5).slice(0, 3);
    setQuizState({ target, type: "loading", options: [], pool });
    setQuizAnswer(""); setQuizFeedback(null);

    // Sentence cache logic: first 3 uses → stored examples, after that → fresh sentence
    const cache = sentenceCache.current;
    const cacheKey = `${lang}:${target.word}`;
    const timesAsked = (cache[cacheKey]?.timesAsked || 0);
    let quizSentence = null;

    if (timesAsked < 3 && target.examples?.[0]) {
      // Use stored examples for first 3 times (pick a different one each time if possible)
      const exs = target.examples || [];
      quizSentence = exs[timesAsked % exs.length] || exs[0];
    } else {
      // Fetch a fresh unique sentence
      const fresh = await fetchQuizSentence(target.word, lang);
      quizSentence = fresh || target.examples?.[0] || null;
    }

    // Update cache
    cache[cacheKey] = { timesAsked: timesAsked + 1 };

    const type = quizSentence ? "fill" : "meaning";
    const options = type === "meaning"
      ? [...others.map(o => o.definition || o.meaning), target.definition || target.meaning].sort(() => Math.random() - 0.5)
      : [...others.map(o => o.word), target.word].sort(() => Math.random() - 0.5);
    setQuizState({ target, type, options, pool, quizSentence });
  };

  const handleQuizAnswer = opt => {
    if (quizFeedback || !quizState || quizState.type === "loading") return;
    setQuizAnswer(opt);
    const correctAnswer = quizState.type === "meaning"
      ? quizState.target.definition || quizState.target.meaning
      : quizState.target.word;
    const isCorrect = opt === correctAnswer;
    const activeLang = nativeLang || "tr";
    const targetWord = quizState.target.word;
    const targetEtym = quizState.target.etymology || null;

    setQuizFeedback({ correct: isCorrect, synonyms: [], etymology: targetEtym, loading: true, wordTranslation: "..." });

    fetchSynonymsAndEtymology(targetWord, lang, !!targetEtym)
      .then(data => {
        setQuizFeedback(prev => prev ? { ...prev, synonyms: data?.synonyms || [], etymology: prev.etymology || data?.etymology || null, loading: false } : prev);
      })
      .catch(() => setQuizFeedback(prev => prev ? { ...prev, loading: false } : prev));

    fetchTranslation(targetWord, lang, activeLang)
      .then(tr => setQuizFeedback(prev => prev ? { ...prev, wordTranslation: tr || null } : prev))
      .catch(() => setQuizFeedback(prev => prev ? { ...prev, wordTranslation: null } : prev));

    const key = `${lang}:${targetWord.toLowerCase()}`;
    setVocabulary(prev => {
      if (!prev[key]) return prev;
      const u = { ...prev, [key]: { ...prev[key], correct: (prev[key].correct || 0) + (isCorrect ? 1 : 0), incorrect: (prev[key].incorrect || 0) + (isCorrect ? 0 : 1), lastQuizzed: Date.now() } };
      try { localStorage.setItem("lexicon_vocab", JSON.stringify(u)); } catch {}
      return u;
    });
  };

  const getVocabList = () => Object.entries(vocabulary)
    .filter(([k]) => k.startsWith(lang + ":"))
    .map(([k, v]) => ({ key: k, ...v }))
    .filter(w => activeFilter === "mastered" ? w.correct >= 8 : activeFilter === "level2" ? w.correct >= 5 && w.correct < 8 : activeFilter === "level1" ? w.correct >= 5 && w.correct < 10 : activeFilter === "learning" ? w.correct < 5 : true)
    .sort((a, b) => b.addedAt - a.addedAt);

  const getAnalytics = () => {
    const words = Object.values(vocabulary).filter(w => w.lang === lang);
    const tc = words.reduce((s, w) => s + (w.correct || 0), 0);
    const ti = words.reduce((s, w) => s + (w.incorrect || 0), 0);
    return {
      total: words.length,
      mastered: words.filter(w => w.correct >= 8).length,
      lvl2: words.filter(w => w.correct >= 5 && w.correct < 8).length,
      lvl1: words.filter(w => w.correct >= 5 && w.correct < 10).length,
      learning: words.filter(w => w.correct < 5).length,
      accuracy: tc + ti > 0 ? Math.round((tc / (tc + ti)) * 100) : 0,
      totalCorrect: tc, words,
    };
  };

  const currentLang = SUPPORTED_LANGS.find(l => l.code === lang);
  const nativeLangFlag = NATIVE_LANGS.find(l => l.code === (nativeLang || "tr"))?.flag || "🌐";
  const notifColor = notification?.type === "streak" ? T.accentOrange : notification?.type === "success" ? T.accentGreen : T.accent;

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)", color: T.text, fontFamily: "-apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, 'Helvetica Neue', sans-serif", WebkitFontSmoothing: "antialiased" }}>
      {/* Subtle grain texture overlay */}
      <div style={{ position: "fixed", inset: 0, zIndex: 0, background: "rgba(255,255,255,0.01)", opacity: 0.4, pointerEvents: "none" }} />
      <div style={{ position: "fixed", inset: 0, zIndex: 0, background: "radial-gradient(ellipse 80% 60% at 30% 100%, rgba(91,141,238,0.06) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 0%, rgba(192,132,245,0.05) 0%, transparent 50%)", pointerEvents: "none" }} />

      {/* ── ONBOARDING: pick native language ── */}
      {!nativeLang && (
        <div style={{ position: "fixed", inset: 0, zIndex: 500, background: "rgba(16,16,36,0.98)", backdropFilter: "blur(40px)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32 }}>
          <div style={{ fontSize: 10, letterSpacing: 5, color: T.textTertiary, textTransform: "uppercase", marginBottom: 12, fontWeight: 500 }}>Welcome to</div>
          <h1 style={{ fontSize: 52, fontWeight: 700, letterSpacing: -3, margin: "0 0 6px", background: "linear-gradient(135deg, #f5f5f7 0%, #636366 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Lexicon</h1>
          <div style={{ width: 32, height: 2, background: T.accent, borderRadius: 1, margin: "0 auto 24px" }} />
          <div style={{ fontSize: 15, color: T.textSecondary, marginBottom: 36, textAlign: "center", lineHeight: 1.6 }}>What is your native language?<br/><span style={{ fontSize: 13, color: T.textTertiary }}>Translations will appear in this language.</span></div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", maxWidth: 360 }}>
            {NATIVE_LANGS.map(l => (
              <button key={l.code} onClick={() => setAndSaveNativeLang(l.code)}
                style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", color: T.text, borderRadius: 50, padding: "9px 18px", cursor: "pointer", fontSize: 14, fontFamily: "inherit", fontWeight: 500, letterSpacing: "-0.01em", transition: "all 0.15s" }}>
                {l.flag} {l.label}
              </button>
            ))}
          </div>
        </div>
      )}

      {notification && (
        <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", background: "rgba(28,28,30,0.95)", border: `1px solid ${notifColor}40`, color: notifColor, padding: "11px 22px", borderRadius: 50, fontSize: 13, fontWeight: 500, zIndex: 1000, backdropFilter: "blur(30px)", WebkitBackdropFilter: "blur(30px)", whiteSpace: "nowrap", boxShadow: `0 4px 24px rgba(0,0,0,0.4), 0 0 0 1px ${notifColor}20` }}>
          {notification.msg}
        </div>
      )}

      <div style={{ maxWidth: 700, margin: "0 auto", padding: "20px 16px", position: "relative", zIndex: 1 }}>

        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 10, letterSpacing: 5, color: T.textTertiary, textTransform: "uppercase", marginBottom: 8, fontWeight: 500 }}>Personal Dictionary</div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 14 }}>
            <h1 style={{ fontSize: 38, fontWeight: 700, margin: 0, letterSpacing: -2, color: T.text, background: "linear-gradient(135deg, #f5f5f7 0%, #98989f 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Lexicon</h1>
            {streak > 0 && (
              <div style={{ background: "rgba(255,159,10,0.12)", border: "1px solid rgba(255,159,10,0.2)", borderRadius: 50, padding: "4px 12px", fontSize: 12, color: T.accentOrange, fontWeight: 600, letterSpacing: "-0.02em" }}>
                🔥 {streak} days
              </div>
            )}
            <button onClick={() => setNativeLang(null)} title="Change native language"
              style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", color: T.textSecondary, borderRadius: 50, padding: "4px 12px", cursor: "pointer", fontSize: 13 }}>
              {nativeLangFlag}
            </button>
          </div>
          <div style={{ display: "flex", gap: 6, justifyContent: "center", marginTop: 14, flexWrap: "wrap" }}>
            {SUPPORTED_LANGS.map(l => (
              <button key={l.code} onClick={() => { setLang(l.code); setSearchResult(null); setQuizState(null); }}
                style={{ background: lang === l.code ? T.accent : "rgba(255,255,255,0.05)", border: lang === l.code ? "none" : "1px solid rgba(255,255,255,0.08)", color: lang === l.code ? "#fff" : T.textSecondary, padding: "6px 14px", borderRadius: 50, cursor: "pointer", fontSize: 13, fontWeight: lang === l.code ? 600 : 400, transition: "all 0.2s", letterSpacing: "-0.01em" }}>
                {l.flag} {l.label}
              </button>
            ))}
          </div>
        </div>

        {/* Nav - two rows, Apple tab style */}
        <div style={{ marginBottom: 24 }}>
          {[[{ id: "home", label: "Home", icon: "⬡" }, { id: "search", label: "Search", icon: "◎" }, { id: "vocab", label: "Vocab", icon: "≡" }],[{ id: "read", label: "Read", icon: "◫" }, { id: "quiz", label: "Quiz", icon: "◈" }, { id: "analytics", label: "Stats", icon: "◻" }]].map((row, ri) => (
            <div key={ri} style={{ display: "flex", gap: 3, marginBottom: ri === 0 ? 3 : 0, background: "rgba(255,255,255,0.04)", borderRadius: 14, padding: 3 }}>
              {row.map(t => (
                <button key={t.id} onClick={() => { setView(t.id); if (t.id === "quiz" && !quizState) startQuiz(); }}
                  style={{ flex: 1, padding: "9px 6px", borderRadius: 11, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 500, letterSpacing: "-0.01em", background: view === t.id ? "rgba(255,255,255,0.1)" : "transparent", color: view === t.id ? T.text : T.textTertiary, fontFamily: "inherit", transition: "all 0.15s" }}>
                  {t.label}
                </button>
              ))}
            </div>
          ))}
        </div>

        {/* ── HOME ── */}
        {view === "home" && (() => {
          const a = getAnalytics();
          return (
            <div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                {[{ label: "Total Words", value: a.total }, { label: "Accuracy", value: `${a.accuracy}%` }, { label: "Mastered ⭐", value: a.mastered }, { label: "In Progress", value: a.lvl1 + a.lvl2 }].map(c => (
                  <div key={c.label} style={{ ...S.card, padding: "18px 16px" }}>
                    <div style={{ fontSize: 10, color: T.textTertiary, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8, fontWeight: 500 }}>{c.label}</div>
                    <div style={{ fontSize: 28, color: T.text, fontWeight: 700, letterSpacing: -1 }}>{c.value}</div>
                  </div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
                <button onClick={() => setView("search")} style={{ ...S.card, padding: "18px 14px", cursor: "pointer", textAlign: "left", border: "1px solid rgba(10,132,255,0.2)" }}>
                  <div style={{ fontSize: 20, marginBottom: 8 }}>🔍</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: T.text }}>Search</div>
                  <div style={{ fontSize: 11, color: T.textTertiary, marginTop: 2 }}>Look up words</div>
                </button>
                <button onClick={() => startFlashcards(false)} style={{ ...S.card, padding: "18px 14px", cursor: "pointer", textAlign: "left", border: "1px solid rgba(90,200,250,0.2)" }}>
                  <div style={{ fontSize: 20, marginBottom: 8 }}>🃏</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: T.text }}>Flashcards</div>
                  <div style={{ fontSize: 11, color: T.textTertiary, marginTop: 2 }}>Review words</div>
                </button>
                <button onClick={() => startFlashcards(true)} style={{ ...S.card, padding: "18px 14px", cursor: "pointer", textAlign: "left", border: "1px solid rgba(48,209,88,0.2)" }}>
                  <div style={{ fontSize: 20, marginBottom: 8 }}>🎯</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: T.text }}>Warm-up</div>
                  <div style={{ fontSize: 11, color: T.textTertiary, marginTop: 2 }}>Then quiz</div>
                </button>
              </div>
              <button onClick={() => { setView("quiz"); startQuiz(); }} style={{ width: "100%", background: T.accentGreen, border: "none", borderRadius: 14, padding: "14px", cursor: "pointer", textAlign: "center", color: "#000", fontSize: 15, fontWeight: 600, fontFamily: "inherit", letterSpacing: "-0.02em" }}>
                Start Quiz →
              </button>
              {a.total === 0 && <div style={{ marginTop: 18, padding: 18, border: "1px dashed rgba(255,255,255,.1)", borderRadius: 12, textAlign: "center", color: T.textTertiary, fontSize: 13 }}>Search your first word, or jump into a quiz with the preset {currentLang?.label} pack!</div>}
            </div>
          );
        })()}

        {/* ── SEARCH ── */}
        {view === "search" && (
          <div>
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <input value={searchWord} onChange={e => setSearchWord(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSearch()}
                placeholder={`Search a ${currentLang?.label} word...`}
                style={{ flex: 1, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.09)", color: T.text, borderRadius: 14, padding: "13px 18px", fontSize: 16, fontFamily: "inherit", outline: "none", letterSpacing: "-0.01em" }} />
              <button onClick={handleSearch} disabled={searching} style={{ background: T.accent, border: "none", color: "#fff", borderRadius: 14, padding: "13px 20px", cursor: "pointer", fontSize: 15, fontFamily: "inherit", fontWeight: 600, letterSpacing: "-0.02em", flexShrink: 0 }}>
                {searching ? "…" : "Search"}
              </button>
            </div>
            <CharKeyboard lang={lang} onChar={ch => setSearchWord(p => p + ch)} onBackspace={() => setSearchWord(p => p.slice(0, -1))} />

            {searching && <div style={{ textAlign: "center", color: T.textTertiary, padding: 40, fontStyle: "italic" }}>Looking up "{searchWord}"...</div>}

            {searchResult && !searchResult.error && (
              <div style={{ ...S.card, padding: 22 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
                  <div>
                    <div style={{ fontSize: 28, fontWeight: 700, letterSpacing: -1, marginBottom: 6, color: T.text }}>{searchResult.word}</div>
                    {searchResult.pronunciation && (
                      <div style={{ fontSize: 14, color: T.accentPurple, marginBottom: 4 }}>
                        {searchResult.pronunciation}
                        <span style={{ fontSize: 11, color: T.textTertiary, marginLeft: 8 }}>— nasıl okunur: {searchResult.pronunciation}</span>
                      </div>
                    )}
                    {searchResult.partOfSpeech && <div style={{ fontSize: 11, color: T.textTertiary, textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>{searchResult.partOfSpeech}</div>}
                    {wordTranslation && (
                      <div style={{ fontSize: 13, color: T.accentGreen, marginTop: 4 }}>
                        {wordTranslation === "..." ? <span style={{ color: T.textTertiary, fontStyle: "italic" }}>Translating...</span> : <span>{nativeLangFlag} {wordTranslation}</span>}
                      </div>
                    )}
                  </div>
                  <button onClick={() => handleSpeak(searchResult.word, lang)}
                    style={{ background: "rgba(167,139,250,.1)", border: "1px solid rgba(167,139,250,.3)", color: T.accentPurple, borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontSize: 18, flexShrink: 0 }}>🔊</button>
                </div>
                <div style={{ marginBottom: 14, color: T.textSecondary, fontSize: 15, lineHeight: 1.7, letterSpacing: "-0.01em" }}>{searchResult.definition}</div>
                {searchResult.etymology && (
                  <div style={{ marginBottom: 14, padding: "12px 14px", background: "rgba(255,159,10,0.06)", border: "1px solid rgba(255,159,10,0.12)", borderRadius: 12 }}>
                    <div style={{ fontSize: 10, color: T.accentOrange, letterSpacing: 2, textTransform: "uppercase", marginBottom: 6, fontWeight: 600 }}>Etymology</div>
                    <div style={{ fontSize: 13, color: "rgba(255,159,10,0.8)", lineHeight: 1.7 }}>{searchResult.etymology}</div>
                  </div>
                )}
                {searchResult.examples?.map((ex, i) => {
                  const trKey = `ex_${i}_${searchResult.word}`;
                  return (
                    <div key={i} style={{ marginBottom: 10 }}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                        <div style={{ flex: 1, fontSize: 14, color: T.textSecondary, fontStyle: "italic", borderLeft: "2px solid rgba(167,139,250,.3)", paddingLeft: 12, lineHeight: 1.6 }}>{ex}</div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 }}>
                          <button onClick={() => handleSpeak(ex, lang)} style={{ background: "none", border: "none", color: T.textTertiary, cursor: "pointer", fontSize: 16, padding: 0 }}>🔊</button>
                          <button onClick={() => getTranslation(ex, lang, trKey)} style={{ background: "none", border: "none", color: T.textTertiary, cursor: "pointer", fontSize: 13, padding: 0 }} title="Translate">{nativeLangFlag}</button>
                        </div>
                      </div>
                      {translations[trKey] && (
                        <div style={{ fontSize: 13, color: T.accentGreen, marginTop: 4, paddingLeft: 14, fontStyle: "italic" }}>{nativeLangFlag} {translations[trKey]}</div>
                      )}
                    </div>
                  );
                })}
                <button onClick={() => addToVocab(searchResult)} style={{ marginTop: 14, width: "100%", background: T.accentGreen, border: "none", color: "#000", borderRadius: 12, padding: "13px", cursor: "pointer", fontSize: 15, fontFamily: "inherit", fontWeight: 600, letterSpacing: "-0.02em" }}>
                  + Add to Vocabulary
                </button>
              </div>
            )}
            {searchResult?.error && <div style={{ textAlign: "center", color: T.accentRed, padding: 20 }}>Could not find "{searchResult.word}". Try another word.</div>}
          </div>
        )}

        {/* ── FLASHCARD ── */}
        {view === "flashcard" && (() => {
          const fc = flashPool[flashIndex];
          if (!fc) return null;
          return (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: T.textTertiary, marginBottom: 12 }}>
                <span>🃏 Flashcards{flashThenQuiz ? " (warm-up)" : ""}</span>
                <span>{flashIndex + 1} / {flashPool.length}</span>
              </div>
              <div style={{ height: 4, background: "rgba(255,255,255,.06)", borderRadius: 2, marginBottom: 18 }}>
                <div style={{ width: `${((flashIndex + 1) / flashPool.length) * 100}%`, height: "100%", background: T.accent, borderRadius: 2, transition: "width .4s" }} />
              </div>
              <div style={{ ...S.card, padding: "40px 28px", textAlign: "center", marginBottom: 14, minHeight: 240, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", boxShadow: "0 20px 60px rgba(0,0,0,0.5)" }}>
                <div style={{ fontSize: 36, fontWeight: 700, letterSpacing: -2, marginBottom: 10, color: T.text }}>{fc.word}</div>
                {fc.pronunciation && <div style={{ fontSize: 13, color: T.accentPurple, marginBottom: 8 }}>{fc.pronunciation}</div>}
                <button onClick={() => handleSpeak(fc.word, lang)} style={{ background: "none", border: "none", color: T.textTertiary, cursor: "pointer", fontSize: 20, marginBottom: 16 }}>🔊</button>
                {!flashRevealed ? (
                  <button onClick={() => {
                    setFlashRevealed(true);
                    setFlashTranslation("...");
                    fetchTranslation(fc.word, lang, nativeLang || "tr").then(tr => setFlashTranslation(tr || fc.nativeTranslation || null));
                  }} style={{ background: T.accent, border: "none", color: "#fff", borderRadius: 50, padding: "10px 28px", cursor: "pointer", fontSize: 15, fontFamily: "inherit", fontWeight: 600, letterSpacing: "-0.02em" }}>
                    Reveal meaning
                  </button>
                ) : (
                  <div>
                    <div style={{ fontSize: 15, color: T.textSecondary, lineHeight: 1.7, marginBottom: 8, letterSpacing: "-0.01em" }}>{fc.definition || fc.meaning}</div>
                    {flashTranslation && (
                      <div style={{ fontSize: 13, color: T.accentGreen, marginBottom: 8 }}>
                        {flashTranslation === "..." ? <span style={{ color: T.textTertiary, fontStyle: "italic", fontSize: 12 }}>Translating...</span> : <span>{nativeLangFlag} {flashTranslation}</span>}
                      </div>
                    )}
                    {fc.etymology && (
                      <div style={{ fontSize: 12, color: "#d1a870", fontStyle: "italic", borderTop: "1px solid rgba(251,146,60,.15)", paddingTop: 10, marginTop: 6 }}>
                        🌱 {fc.etymology}
                      </div>
                    )}
                  </div>
                )}
              </div>
              {flashRevealed ? (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <button onClick={flashNext} style={{ background: "rgba(255,69,58,0.1)", border: "1px solid rgba(255,69,58,0.25)", color: T.accentRed, borderRadius: 14, padding: "13px", cursor: "pointer", fontSize: 15, fontFamily: "inherit", fontWeight: 600, letterSpacing: "-0.02em" }}>✗ Didn't know</button>
                  <button onClick={flashKnew} style={{ background: T.accentGreen, border: "none", color: "#000", borderRadius: 14, padding: "13px", cursor: "pointer", fontSize: 15, fontFamily: "inherit", fontWeight: 600, letterSpacing: "-0.02em" }}>✓ Knew it</button>
                </div>
              ) : (
                <button onClick={flashNext} style={{ width: "100%", background: "rgba(255,255,255,.03)", border: "1px solid rgba(255,255,255,.07)", color: T.textTertiary, borderRadius: 12, padding: "12px", cursor: "pointer", fontSize: 14, fontFamily: "inherit" }}>Skip →</button>
              )}
            </div>
          );
        })()}

        {/* ── VOCAB ── */}
        {view === "vocab" && (() => {
          const list = getVocabList();
          return (
            <div>
              <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
                {[{ id: "all", label: "All" }, { id: "mastered", label: "⭐ Mastered" }, { id: "level2", label: "🔥 Level 2" }, { id: "level1", label: "✓ Level 1" }, { id: "learning", label: "◎ Learning" }].map(f => (
                  <button key={f.id} onClick={() => setActiveFilter(f.id)} style={{ background: activeFilter === f.id ? "rgba(167,139,250,.15)" : "rgba(255,255,255,.03)", border: activeFilter === f.id ? "1px solid rgba(167,139,250,.4)" : "1px solid rgba(255,255,255,.07)", color: activeFilter === f.id ? "rgba(191,90,242,0.9)" : T.textTertiary, borderRadius: 20, padding: "6px 14px", cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>{f.label}</button>
                ))}
              </div>
              {list.length === 0 ? <div style={{ textAlign: "center", color: T.textTertiary, padding: 40, fontStyle: "italic" }}>No words here yet.</div> :
                list.map(word => {
                  const lvl = getLevelLabel(word.correct || 0);
                  return (
                    <div key={word.key} style={{ ...S.card, padding: "14px 16px", marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                          <span style={{ fontSize: 17, fontStyle: "italic" }}>{word.word}</span>
                          <button onClick={() => handleSpeak(word.word, lang)} style={{ background: "none", border: "none", color: T.textTertiary, cursor: "pointer", fontSize: 13 }}>🔊</button>
                          <span style={{ fontSize: 10, color: lvl.color, border: `1px solid ${lvl.color}40`, borderRadius: 10, padding: "2px 8px" }}>{lvl.icon} {lvl.label}</span>
                        </div>
                        <div style={{ fontSize: 13, color: T.textSecondary, lineHeight: 1.5 }}>{word.definition || word.meaning}</div>
                        {word.etymology && <div style={{ fontSize: 11, color: "#d1a870", marginTop: 5, fontStyle: "italic" }}>🌱 {word.etymology}</div>}
                      </div>
                      <div style={{ textAlign: "right", fontSize: 11, color: T.textTertiary, flexShrink: 0 }}>
                        <div style={{ color: T.accentGreen }}>✓ {word.correct || 0}</div>
                        <div style={{ color: T.accentRed }}>✗ {word.incorrect || 0}</div>
                        <div style={{ width: 50, height: 3, background: "rgba(255,255,255,.08)", borderRadius: 2, marginTop: 5 }}>
                          <div style={{ width: `${Math.min(((word.correct || 0) / 8) * 100, 100)}%`, height: "100%", background: lvl.color, borderRadius: 2 }} />
                        </div>
                      </div>
                    </div>
                  );
                })}
            </div>
          );
        })()}

        {/* ── READING ── */}
        {view === "read" && (
          <div>
            {/* Level + Generate */}
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
              <span style={{ fontSize: 13, color: T.textTertiary }}>Level:</span>
              {LEVELS.map(lvl => (
                <button key={lvl} onClick={() => setPassageLevel(lvl)}
                  style={{ background: passageLevel === lvl ? "rgba(167,139,250,.18)" : "rgba(255,255,255,.03)", border: passageLevel === lvl ? "1px solid rgba(167,139,250,.4)" : "1px solid rgba(255,255,255,.07)", color: passageLevel === lvl ? "rgba(191,90,242,0.9)" : T.textTertiary, borderRadius: 20, padding: "5px 12px", cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>
                  {lvl}
                </button>
              ))}
              <button onClick={async () => {
    setQuizSubmitted(false);
    setQuizAnswers({});
    setSelectedWord(null);
    setWordPopup(null);
    await loadPassage();
  }} style={{ marginLeft: "auto", background: "rgba(52,211,153,.12)", border: "1px solid rgba(52,211,153,.3)", color: T.accentGreen, borderRadius: 10, padding: "8px 18px", cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>
                {passageLoading ? "Generating..." : passage ? "New Passage" : "Generate Passage"}
              </button>
            </div>

            {!passage && !passageLoading && (
              <div style={{ ...S.card, padding: 32, textAlign: "center", color: T.textTertiary, fontStyle: "italic" }}>
                Choose a level and generate a passage to start reading.<br/>
                <span style={{ fontSize: 12, marginTop: 8, display: "block" }}>Tap any word to look it up and add it to your vocabulary.</span>
              </div>
            )}
            {passage?.error && !passageLoading && (
              <div style={{ ...S.card, padding: 24, textAlign: "center", color: T.accentRed, fontSize: 14 }}>
                Could not generate passage. Please try again.
                <button onClick={async () => {
    setQuizSubmitted(false);
    setQuizAnswers({});
    setSelectedWord(null);
    setWordPopup(null);
    await loadPassage();
  }} style={{ display: "block", margin: "12px auto 0", background: "rgba(52,211,153,.12)", border: "1px solid rgba(52,211,153,.3)", color: T.accentGreen, borderRadius: 8, padding: "8px 20px", cursor: "pointer", fontFamily: "inherit" }}>Try Again</button>
              </div>
            )}

            {passageLoading && (
              <div style={{ ...S.card, padding: 32, textAlign: "center", color: T.textTertiary, fontStyle: "italic" }}>
                Generating your {passageLevel} passage...
              </div>
            )}

            {passage && !passage.error && !passageLoading && (
              <div>
                {/* Passage */}
                <div style={{ ...S.card, padding: 22, marginBottom: 14 }}>
                  <div style={{ fontSize: 12, color: T.textTertiary, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>{passageLevel} · {currentLang?.label}</div>
                  <div style={{ fontSize: 18, fontStyle: "italic", color: T.text, marginBottom: 16 }}>{passage.title}</div>
                  <div style={{ fontSize: 12, color: T.textTertiary, marginBottom: 12 }}>Tap any word to look it up →</div>
                  {passage.passage.split("\n\n").map((para, pi) => (
                    <p key={pi} style={{ lineHeight: 1.9, marginBottom: 14, color: T.textSecondary, fontSize: 15 }}>
                      {para.split(/\s+/).map((word, wi) => {
                        const clean = word.replace(/[^\w\u00C0-\u024F\u0400-\u04FF]/g, "");
                        const isSelected = selectedWord === clean && clean.length >= 3;
                        return (
                          <span key={wi}
                            onClick={() => clean.length >= 3 && handleWordClick(word)}
                            style={{ cursor: clean.length >= 3 ? "pointer" : "default", borderBottom: clean.length >= 3 ? "1px dotted rgba(167,139,250,.3)" : "none", color: isSelected ? "rgba(191,90,242,0.9)" : "inherit", background: isSelected ? "rgba(167,139,250,.1)" : "transparent", borderRadius: 3, padding: "0 1px" }}>
                            {word}{" "}
                          </span>
                        );
                      })}
                    </p>
                  ))}
                </div>

                {/* Word Popup */}
                {(wordPopupLoading || wordPopup) && (
                  <div style={{ ...S.card, padding: 18, marginBottom: 14, borderColor: "rgba(167,139,250,.25)" }}>
                    {wordPopupLoading ? (
                      <div style={{ color: T.textTertiary, fontStyle: "italic", fontSize: 13 }}>Looking up "{selectedWord}"...</div>
                    ) : wordPopup && (
                      <>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                          <div>
                            <div style={{ fontSize: 22, fontStyle: "italic" }}>{wordPopup.word}</div>
                            {wordPopup.pronunciation && <div style={{ fontSize: 13, color: T.accentPurple }}>{wordPopup.pronunciation}</div>}
                            {wordPopup.partOfSpeech && <div style={{ fontSize: 11, color: T.textTertiary, textTransform: "uppercase", letterSpacing: 1 }}>{wordPopup.partOfSpeech}</div>}
                          </div>
                          <button onClick={() => handleSpeak(wordPopup.word, lang)} style={{ background: "none", border: "none", color: T.textTertiary, cursor: "pointer", fontSize: 18 }}>🔊</button>
                        </div>
                        <div style={{ fontSize: 14, color: "rgba(191,90,242,0.9)", lineHeight: 1.6, marginBottom: 8 }}>{wordPopup.definition}</div>
                        {wordPopup.nativeTranslation && (
                          <div style={{ fontSize: 13, color: T.accentGreen, marginBottom: 10 }}>{nativeLangFlag} {wordPopup.nativeTranslation}</div>
                        )}
                        <button onClick={addPopupWordToVocab} style={{ width: "100%", background: "rgba(52,211,153,.1)", border: "1px solid rgba(52,211,153,.3)", color: T.accentGreen, borderRadius: 8, padding: "9px", cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>
                          + Add to Vocabulary
                        </button>
                      </>
                    )}
                  </div>
                )}

                {/* Comprehension Questions */}
                <div style={{ ...S.card, padding: 20 }}>
                  <div style={{ fontSize: 12, color: T.textTertiary, letterSpacing: 2, textTransform: "uppercase", marginBottom: 16 }}>Comprehension</div>
                  {passage.questions.map((q, qi) => (
                    <div key={qi} style={{ marginBottom: 20 }}>
                      <div style={{ fontSize: 14, color: T.text, marginBottom: 10, lineHeight: 1.6 }}>{qi + 1}. {q.question}</div>
                      <div style={{ display: "grid", gap: 7 }}>
                        {q.options.map((opt, oi) => {
                          const letter = opt[0];
                          const isSelected = quizAnswers[qi] === letter;
                          const isCorrect = letter === q.answer;
                          let bg = "rgba(255,255,255,.03)", border = "1px solid rgba(255,255,255,.07)", color = T.textSecondary;
                          if (quizSubmitted) {
                            if (isCorrect) { bg = "rgba(52,211,153,.12)"; border = "1px solid #34d399"; color = T.accentGreen; }
                            else if (isSelected) { bg = "rgba(248,113,113,.1)"; border = "1px solid #f87171"; color = T.accentRed; }
                          } else if (isSelected) {
                            bg = "rgba(167,139,250,.12)"; border = "1px solid rgba(167,139,250,.4)"; color = "rgba(191,90,242,0.9)";
                          }
                          return (
                            <button key={oi} onClick={() => !quizSubmitted && setQuizAnswers(prev => ({ ...prev, [qi]: letter }))}
                              style={{ background: bg, border, color, borderRadius: 8, padding: "9px 12px", cursor: quizSubmitted ? "default" : "pointer", fontSize: 13, fontFamily: "inherit", textAlign: "left" }}>
                              {opt}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                  {!quizSubmitted ? (
                    <button onClick={() => Object.keys(quizAnswers).length === passage.questions.length && setQuizSubmitted(true)}
                      disabled={Object.keys(quizAnswers).length < passage.questions.length}
                      style={{ width: "100%", background: Object.keys(quizAnswers).length === passage.questions.length ? "rgba(167,139,250,.15)" : "rgba(255,255,255,.03)", border: `1px solid ${Object.keys(quizAnswers).length === passage.questions.length ? "rgba(167,139,250,.4)" : "rgba(255,255,255,.07)"}`, color: Object.keys(quizAnswers).length === passage.questions.length ? "rgba(191,90,242,0.9)" : "#4b4860", borderRadius: 10, padding: "12px", cursor: Object.keys(quizAnswers).length === passage.questions.length ? "pointer" : "default", fontSize: 14, fontFamily: "inherit" }}>
                      Check Answers
                    </button>
                  ) : (
                    <div style={{ textAlign: "center", padding: "12px 0" }}>
                      <div style={{ fontSize: 20, marginBottom: 6 }}>
                        {passage.questions.filter((q, i) => quizAnswers[i] === q.answer).length} / {passage.questions.length} correct
                      </div>
                      <div style={{ fontSize: 13, color: T.textTertiary }}>
                        {passage.questions.filter((q, i) => quizAnswers[i] === q.answer).length === passage.questions.length ? "🎉 Perfect score!" : "Keep reading to improve!"}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── QUIZ ── */}
        {view === "quiz" && (
          <div>
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <span style={{ fontSize: 13, color: T.textTertiary }}>{getAllQuizWords().length} words in pool</span>
                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, color: T.textSecondary }}>
                  <input type="checkbox" checked={includePacks} onChange={e => setIncludePacks(e.target.checked)} style={{ accentColor: T.accentPurple }} /> Preset packs
                </label>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <button onClick={() => setAndSaveLevel(null)}
                  style={{ background: !selectedLevel ? "rgba(167,139,250,.18)" : "rgba(255,255,255,.03)", border: !selectedLevel ? "1px solid rgba(167,139,250,.4)" : "1px solid rgba(255,255,255,.07)", color: !selectedLevel ? "rgba(191,90,242,0.9)" : T.textTertiary, borderRadius: 20, padding: "5px 12px", cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>
                  No level pack
                </button>
                {LEVELS.map(lvl => (
                  <button key={lvl} onClick={() => setAndSaveLevel(lvl)}
                    style={{ background: selectedLevel === lvl ? "rgba(167,139,250,.18)" : "rgba(255,255,255,.03)", border: selectedLevel === lvl ? "1px solid rgba(167,139,250,.4)" : "1px solid rgba(255,255,255,.07)", color: selectedLevel === lvl ? "rgba(191,90,242,0.9)" : T.textTertiary, borderRadius: 20, padding: "5px 12px", cursor: "pointer", fontSize: 12, fontFamily: "inherit" }}>
                    {lvl}
                  </button>
                ))}
              </div>
            </div>

            {!quizState ? (
              <div style={{ textAlign: "center", padding: 40 }}>
                <div style={{ color: T.textTertiary, marginBottom: 20, fontStyle: "italic" }}>{getAllQuizWords().length < 2 ? "Need at least 2 words." : "Ready?"}</div>
                <button onClick={startQuiz} style={{ background: "rgba(52,211,153,.12)", border: "1px solid rgba(52,211,153,.3)", color: T.accentGreen, borderRadius: 12, padding: "14px 32px", cursor: "pointer", fontSize: 16, fontFamily: "inherit" }}>Start Quiz</button>
              </div>
            ) : (
              <div>
                <div style={{ ...S.card, padding: 22, marginBottom: 12 }}>
                  {(() => {
                    const { target, type, options, quizSentence } = quizState;
                    if (!target || type === "loading" || !options?.length) return (
                      <div style={{ textAlign: "center", padding: "40px 0", color: T.textTertiary, fontStyle: "italic" }}>
                        Preparing question...
                      </div>
                    );
                    const correctAnswer = type === "meaning" ? target.definition || target.meaning : target.word;
                    const blank = s => s ? s.replace(new RegExp(target.word, "gi"), "_____") : "";
                    const exs = target.examples || [];
                    return (
                      <>
                        {type === "meaning" ? (
                          <>
                            <div style={{ fontSize: 11, color: T.textTertiary, letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>What does this mean?</div>
                            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                              <span style={{ fontSize: 30, fontStyle: "italic" }}>{target.word}</span>
                              <button onClick={() => handleSpeak(target.word, lang)} style={{ background: "none", border: "none", color: T.textTertiary, cursor: "pointer", fontSize: 20 }}>🔊</button>
                            </div>
                          </>
                        ) : (
                          <>
                            <div style={{ fontSize: 11, color: T.textTertiary, letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Fill in the blank</div>
                            <div style={{ marginBottom: 16 }}>
                              <div style={{ fontSize: 14, color: "rgba(191,90,242,0.9)", lineHeight: 1.8, fontStyle: "italic", borderLeft: "2px solid rgba(167,139,250,.3)", paddingLeft: 14 }}>
                                {blank(quizSentence || "")}
                              </div>
                            </div>
                          </>
                        )}
                        <div style={{ display: "grid", gap: 8 }}>
                          {options.map((opt, i) => {
                            const sel = quizAnswer === opt;
                            let bg = "rgba(255,255,255,0.05)", br = "1px solid rgba(255,255,255,0.08)", col = T.textSecondary;
                            if (quizFeedback) {
                              if (opt === correctAnswer) { bg = "rgba(48,209,88,0.12)"; br = "1px solid rgba(48,209,88,0.4)"; col = T.accentGreen; }
                              else if (sel) { bg = "rgba(255,69,58,0.1)"; br = "1px solid rgba(255,69,58,0.3)"; col = T.accentRed; }
                            } else if (sel) { bg = "rgba(10,132,255,0.12)"; br = "1px solid rgba(10,132,255,0.4)"; col = T.accent; }
                            return (
                              <button key={i} onClick={() => handleQuizAnswer(opt)} style={{ background: bg, border: br, color: col, borderRadius: 12, padding: "12px 16px", cursor: quizFeedback ? "default" : "pointer", fontSize: 14, fontFamily: "inherit", textAlign: "left", lineHeight: 1.6, letterSpacing: "-0.01em", transition: "all 0.15s" }}>
                                {opt}
                              </button>
                            );
                          })}
                        </div>

                        {quizFeedback && (
                          <div style={{ marginTop: 14, padding: 16, borderRadius: 14, background: quizFeedback.correct ? "rgba(48,209,88,0.07)" : "rgba(255,69,58,0.07)", border: `1px solid ${quizFeedback.correct ? "rgba(48,209,88,0.2)" : "rgba(255,69,58,0.2)"}` }}>
                            <div style={{ color: quizFeedback.correct ? T.accentGreen : T.accentRed, fontWeight: 700, fontSize: 15, marginBottom: 12, letterSpacing: "-0.02em" }}>{quizFeedback.correct ? "✓ Correct!" : "✗ Incorrect"}</div>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                              <span style={{ fontSize: 19, fontStyle: "italic" }}>{target.word}</span>
                              {target.partOfSpeech && <span style={{ fontSize: 10, color: T.textTertiary, textTransform: "uppercase", letterSpacing: 1 }}>{target.partOfSpeech}</span>}
                              <button onClick={() => handleSpeak(target.word, lang)} style={{ background: "none", border: "none", color: T.textTertiary, cursor: "pointer", fontSize: 15 }}>🔊</button>
                            </div>
                            <div style={{ fontSize: 14, color: "rgba(191,90,242,0.9)", marginBottom: 10, lineHeight: 1.6 }}>{target.definition || target.meaning}</div>

                            {quizFeedback.wordTranslation && (
                              <div style={{ fontSize: 13, color: T.accentGreen, marginBottom: 8 }}>
                                {quizFeedback.wordTranslation === "..." ? <span style={{ color: T.textTertiary, fontStyle: "italic", fontSize: 12 }}>Translating...</span> : <span>{nativeLangFlag} {quizFeedback.wordTranslation}</span>}
                              </div>
                            )}

                            {(quizFeedback.etymology || quizFeedback.loading) && (
                              <div style={{ marginBottom: 10, padding: "8px 12px", background: "rgba(251,146,60,.06)", border: "1px solid rgba(251,146,60,.15)", borderRadius: 8 }}>
                                <div style={{ fontSize: 10, color: T.accentOrange, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>🌱 Etymology</div>
                                <div style={{ fontSize: 13, color: "#d1a870", lineHeight: 1.6 }}>{quizFeedback.etymology || <span style={{ fontStyle: "italic", color: T.textTertiary }}>Loading...</span>}</div>
                              </div>
                            )}

                            {quizFeedback.synonyms?.length > 0 && (
                              <div style={{ marginBottom: 8 }}>
                                <span style={{ fontSize: 10, color: T.textTertiary, textTransform: "uppercase", letterSpacing: 1, marginRight: 8 }}>Synonyms</span>
                                {quizFeedback.synonyms.map((s, i) => (
                                  <span key={i} style={{ display: "inline-block", marginRight: 5, marginBottom: 4, background: "rgba(167,139,250,.1)", border: "1px solid rgba(167,139,250,.2)", color: T.accentPurple, borderRadius: 12, padding: "2px 10px", fontSize: 12 }}>{s}</span>
                                ))}
                              </div>
                            )}
                            {quizFeedback.loading && !quizFeedback.synonyms?.length && (
                              <div style={{ fontSize: 12, color: T.textTertiary, fontStyle: "italic", marginBottom: 8 }}>Loading synonyms...</div>
                            )}

                            {exs.map((ex, i) => (
                              <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, marginTop: 6 }}>
                                <div style={{ fontSize: 13, color: T.textSecondary, fontStyle: "italic", flex: 1, lineHeight: 1.6, borderLeft: "2px solid rgba(167,139,250,.2)", paddingLeft: 10 }}>{ex}</div>
                                <button onClick={() => handleSpeak(ex, lang)} style={{ background: "none", border: "none", color: T.textTertiary, cursor: "pointer", flexShrink: 0 }}>🔊</button>
                              </div>
                            ))}
                          </div>
                        )}
                      </>
                    );
                  })()}
                </div>

                <div style={{ marginBottom: 10 }}>
                  {quizFeedback ? (
                    <button onClick={async () => await nextQuestion()} style={{ background: T.accent, border: "none", color: "#fff", borderRadius: 14, padding: "13px 20px", cursor: "pointer", fontSize: 15, fontFamily: "inherit", width: "100%", fontWeight: 600, letterSpacing: "-0.02em" }}>Next Word →</button>
                  ) : (
                    <button onClick={async () => await nextQuestion()} style={{ width: "100%", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", color: T.textTertiary, borderRadius: 14, padding: "13px", cursor: "pointer", fontSize: 15, fontFamily: "inherit", letterSpacing: "-0.01em" }}>Skip</button>
                  )}
                </div>

                {(() => {
                  const key = `${lang}:${quizState.target.word.toLowerCase()}`;
                  const wd = vocabulary[key];
                  const c = wd?.correct || 0;
                  const lvl = getLevelLabel(c);
                  return (
                    <div style={{ padding: "10px 14px", background: "rgba(255,255,255,.02)", borderRadius: 10 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: T.textTertiary, marginBottom: 5 }}>
                        <span style={{ fontStyle: "italic" }}>{quizFeedback ? quizState.target.word : "?"}</span>
                        <span style={{ color: lvl.color }}>{lvl.icon} {lvl.label} ({c}/8)</span>
                      </div>
                      <div style={{ height: 3, background: "rgba(255,255,255,.06)", borderRadius: 2 }}>
                        <div style={{ width: `${Math.min((c / 8) * 100, 100)}%`, height: "100%", background: lvl.color, borderRadius: 2, transition: "width .5s" }} />
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}
          </div>
        )}

        {/* ── ANALYTICS ── */}
        {view === "analytics" && (() => {
          const a = getAnalytics();
          return (
            <div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 14 }}>
                {[{ label: "Total", value: a.total }, { label: "Accuracy", value: `${a.accuracy}%` }, { label: "Correct", value: a.totalCorrect }].map(c => (
                  <div key={c.label} style={{ ...S.card, textAlign: "center", padding: "14px 10px" }}>
                    <div style={{ fontSize: 22, color: T.accentPurple, fontStyle: "italic" }}>{c.value}</div>
                    <div style={{ fontSize: 10, color: T.textTertiary, marginTop: 4, textTransform: "uppercase", letterSpacing: 1 }}>{c.label}</div>
                  </div>
                ))}
              </div>

              {streak > 0 && (
                <div style={{ ...S.card, marginBottom: 14, display: "flex", alignItems: "center", gap: 14, padding: "14px 18px" }}>
                  <div style={{ fontSize: 30 }}>🔥</div>
                  <div>
                    <div style={{ fontSize: 22, color: T.accentOrange, fontWeight: 700, letterSpacing: -1 }}>{streak} day streak</div>
                    <div style={{ fontSize: 12, color: T.textTertiary }}>Keep going — study every day!</div>
                  </div>
                </div>
              )}

              <div style={{ ...S.card, marginBottom: 14, padding: 20 }}>
                <div style={{ fontSize: 11, color: T.textTertiary, letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Level Breakdown</div>
                {[{ label: "⭐ Mastered", count: a.mastered, color: T.accentPurple }, { label: "🔥 Level 2", count: a.lvl2, color: T.accentGreen }, { label: "✓ Level 1", count: a.lvl1, color: T.accent }, { label: "◎ Learning", count: a.learning, color: T.accentOrange }].map(row => (
                  <div key={row.label} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 4 }}>
                      <span style={{ color: T.textSecondary }}>{row.label}</span>
                      <span style={{ color: row.color }}>{row.count}</span>
                    </div>
                    <div style={{ height: 5, background: "rgba(255,255,255,.06)", borderRadius: 3 }}>
                      <div style={{ width: `${(row.count / Math.max(a.total, 1)) * 100}%`, height: "100%", background: row.color, borderRadius: 3, transition: "width .6s" }} />
                    </div>
                  </div>
                ))}
              </div>

              {a.words.filter(w => w.incorrect > 0).length > 0 && (
                <div style={{ ...S.card, padding: 20 }}>
                  <div style={{ fontSize: 11, color: T.textTertiary, letterSpacing: 2, textTransform: "uppercase", marginBottom: 12 }}>Words to Review</div>
                  {a.words.filter(w => w.incorrect > 0).sort((x, y) => (y.incorrect / Math.max(y.correct + y.incorrect, 1)) - (x.incorrect / Math.max(x.correct + x.incorrect, 1))).slice(0, 5).map(w => (
                    <div key={w.word} style={{ display: "flex", justifyContent: "space-between", marginBottom: 8, fontSize: 14 }}>
                      <span style={{ fontStyle: "italic", color: T.textSecondary }}>{w.word}</span>
                      <span style={{ color: T.accentRed }}>✗ {w.incorrect} / {w.correct + w.incorrect}</span>
                    </div>
                  ))}
                </div>
              )}
              {a.total === 0 && <div style={{ textAlign: "center", color: T.textTertiary, padding: 40, fontStyle: "italic" }}>Add words to see your analytics.</div>}
            </div>
          );
        })()}

      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(LexiconApp));
  </script>
</body>
</html>
